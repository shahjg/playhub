<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truth or Dare – TheGaming.co</title>
    <meta name="theme-color" content="#0a0a0f">
    <link rel="stylesheet" href="/header.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0f;--card:#12121f;--accent:#14b8a6;--accent2:#06b6d4;--truth:#14b8a6;--dare:#f59e0b;--green:#22c55e;--gold:#fbbf24;--text:#fff;--dim:rgba(255,255,255,0.45);--border:rgba(255,255,255,0.06)}
        html{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
        h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:2px}

        .bg{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(20,184,166,0.06),transparent 60%),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(6,182,212,0.04),transparent 50%),var(--bg)}

        header{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;display:flex;align-items:center;padding:0 14px;background:rgba(10,10,15,0.94);backdrop-filter:blur(20px)}
        header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
        .nav{width:100%;max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .back{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;background:0;border:1px solid var(--border);color:var(--dim);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-decoration:none;transition:.2s}
        .back:hover{color:var(--accent);border-color:rgba(20,184,166,0.3)}
        .back svg{width:12px;height:12px}
        .hdr-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hdr-code{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:3px;color:var(--accent);padding:3px 10px;border:1px solid rgba(20,184,166,0.15);border-radius:4px;background:rgba(20,184,166,0.05)}

        main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px 30px;max-width:500px;margin:0 auto;width:100%}

        .phase{display:none;width:100%}.phase.on{display:flex;flex-direction:column;align-items:center;animation:fadeUp .3s ease-out}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        /* === LOBBY === */
        .lobby-icon{font-size:3.5rem;margin-bottom:12px}
        .lobby-title{font-size:2.5rem;letter-spacing:4px;text-align:center;margin-bottom:4px}
        .lobby-sub{color:var(--dim);font-size:.85rem;margin-bottom:24px;text-align:center}
        .name-input{width:100%;max-width:320px;padding:14px 18px;font-size:1rem;font-weight:600;background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:12px;color:#fff;text-align:center;outline:none;transition:.3s;margin-bottom:12px}
        .name-input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(20,184,166,0.1)}
        .name-input::placeholder{color:rgba(255,255,255,0.2)}
        .lobby-btns{display:flex;gap:10px;width:100%;max-width:320px;margin-bottom:16px}
        .btn{flex:1;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;border:none;border-radius:12px;cursor:pointer;transition:.2s}
        .btn-create{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(20,184,166,0.3)}
        .btn-join{background:rgba(255,255,255,0.04);border:1px solid var(--border)!important;color:var(--text)}
        .btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .join-row{display:flex;gap:8px;width:100%;max-width:320px}
        .code-input{flex:1;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:4px;text-align:center;background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:12px;color:var(--accent);outline:none;text-transform:uppercase}
        .code-input:focus{border-color:var(--accent)}
        .or-line{display:flex;align-items:center;gap:12px;width:100%;max-width:320px;margin:12px 0;color:var(--dim);font-size:.7rem;letter-spacing:2px}
        .or-line::before,.or-line::after{content:'';flex:1;height:1px;background:var(--border)}

        /* === SETUP === */
        .setup-title{font-size:1.8rem;letter-spacing:3px;margin-bottom:4px;text-align:center}
        .setup-sub{color:var(--dim);font-size:.8rem;margin-bottom:16px;text-align:center}
        .setup-code{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:6px;color:var(--accent);text-align:center;margin-bottom:4px}
        .setup-copy{color:var(--dim);font-size:.7rem;cursor:pointer;text-align:center;margin-bottom:16px;text-decoration:underline}
        .players-box{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
        .p-chip{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:600;border:1px solid var(--border);background:rgba(255,255,255,0.03)}
        .p-chip.me{border-color:var(--accent);color:var(--accent)}
        .p-chip.waiting{color:var(--dim);border-style:dashed}
        .section-label{font-size:.6rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;text-align:center}
        .spice-row{display:flex;gap:8px;margin-bottom:16px;width:100%;max-width:360px}
        .spice-btn{flex:1;padding:12px 8px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid var(--border);background:rgba(255,255,255,0.02);transition:.2s;font-size:.75rem;font-weight:700}
        .spice-btn.sel{border-color:var(--accent);background:rgba(20,184,166,0.08);color:var(--accent)}
        .spice-btn:hover{border-color:rgba(20,184,166,0.3)}
        .spice-icon{font-size:1.4rem;display:block;margin-bottom:4px}
        .pack-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:360px;margin-bottom:20px}
        .pack-btn{padding:14px 8px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid var(--border);background:rgba(255,255,255,0.02);transition:.2s;font-size:.7rem;font-weight:700;letter-spacing:1px}
        .pack-btn.sel{border-color:var(--accent);background:rgba(20,184,166,0.08);color:var(--accent)}
        .pack-btn:hover{border-color:rgba(20,184,166,0.3)}
        .pack-icon{font-size:1.2rem;display:block;margin-bottom:4px}

        /* === GAME === */
        .progress{width:100%;max-width:400px;margin-bottom:16px}
        .prog-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:6px}
        .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
        .prog-fill.dare-fill{background:linear-gradient(90deg,var(--dare),#ef4444)}
        .prog-txt{text-align:center;font-size:.7rem;color:var(--dim);letter-spacing:1px}

        .prompt-card{width:100%;max-width:420px;text-align:center;margin-bottom:24px;animation:cardIn .45s cubic-bezier(.16,1,.3,1)}
        @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}

        .prompt-inner{padding:40px 24px;border-radius:20px;border:2px solid;position:relative;overflow:hidden}
        .prompt-inner.truth-style{background:rgba(20,184,166,0.05);border-color:rgba(20,184,166,0.2)}
        .prompt-inner.dare-style{background:rgba(245,158,11,0.05);border-color:rgba(245,158,11,0.2)}
        .prompt-inner::before{content:'';position:absolute;inset:0;pointer-events:none}
        .prompt-inner.truth-style::before{background:radial-gradient(ellipse at 50% 0%,rgba(20,184,166,0.08),transparent 70%)}
        .prompt-inner.dare-style::before{background:radial-gradient(ellipse at 50% 0%,rgba(245,158,11,0.08),transparent 70%)}

        .type-badge{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:6px;padding:8px 32px;border-radius:8px;margin-bottom:24px;font-weight:700;text-transform:uppercase;position:relative}
        .type-badge.truth{background:rgba(20,184,166,0.12);border:2px solid rgba(20,184,166,0.35);color:var(--truth);text-shadow:0 0 20px rgba(20,184,166,0.3)}
        .type-badge.dare{background:rgba(245,158,11,0.12);border:2px solid rgba(245,158,11,0.35);color:var(--dare);text-shadow:0 0 20px rgba(245,158,11,0.3)}

        .prompt-text{font-size:1.55rem;font-weight:800;line-height:1.5;padding:0 4px;position:relative}
        .truth-style .prompt-text{color:#5eead4}
        .dare-style .prompt-text{color:#fcd34d}

        .partner-status{text-align:center;font-size:.75rem;color:var(--dim);margin-top:8px;min-height:20px}

        /* Reactions */
        .react-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
        .react-btn{font-size:1.5rem;padding:8px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;transition:.2s;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
        .react-btn:hover{transform:scale(1.15);border-color:var(--accent)}
        .incoming-react{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5rem;z-index:200;pointer-events:none;animation:reactPop .8s ease-out forwards}
        @keyframes reactPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)}30%{transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}

        .next-btn{padding:14px 32px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(20,184,166,0.3);transition:.2s}
        .next-btn:hover{transform:translateY(-2px)}
        .fav-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:0;color:var(--dim);font-size:.8rem;cursor:pointer;transition:.2s}
        .fav-btn:hover,.fav-btn.saved{color:var(--gold);border-color:var(--gold)}
        .btn-row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}

        /* === END === */
        .end-icon{font-size:3.5rem;margin-bottom:8px}
        .end-title{font-size:2.5rem;letter-spacing:4px;margin-bottom:4px;text-align:center}
        .end-sub{color:var(--dim);font-size:.85rem;margin-bottom:16px;text-align:center}
        .end-stat{font-family:'Bebas Neue',sans-serif;font-size:4rem;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1}
        .end-stat-lbl{font-size:.65rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:20px}
        .end-btns{display:flex;gap:10px;width:100%;max-width:320px}

        .error-msg{color:#ef4444;font-size:.8rem;text-align:center;margin-top:8px;min-height:20px}

        @keyframes confFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
        .conf{position:fixed;top:0;z-index:300;animation:confFall 3s linear forwards;pointer-events:none;border-radius:2px}
    </style>
</head>
<body>
<div class="bg"></div>
<header><nav class="nav">
    <a href="/duos.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
    <span class="hdr-title">TRUTH OR DARE</span>
    <span class="hdr-code" id="hdrCode" style="display:none"></span>
</nav></header>

<main>
<!-- LOBBY -->
<div class="phase on" id="phLobby">
    <div class="lobby-icon">🎭</div>
    <h1 class="lobby-title">TRUTH OR DARE</h1>
    <p class="lobby-sub">Get bold with your partner</p>
    <input class="name-input" id="nameInput" placeholder="Your name" maxlength="16" autocomplete="off">
    <div class="lobby-btns">
        <button class="btn btn-create" onclick="createRoom()">CREATE ROOM</button>
    </div>
    <div class="or-line">OR JOIN</div>
    <div class="join-row">
        <input class="code-input" id="codeInput" placeholder="CODE" maxlength="6">
        <button class="btn btn-join" onclick="joinRoom()" style="flex:0 0 80px">JOIN</button>
    </div>
    <div class="error-msg" id="lobbyErr"></div>
</div>

<!-- SETUP (host picks spice + pack, waits for player 2) -->
<div class="phase" id="phSetup">
    <h2 class="setup-title">GAME SETUP</h2>
    <p class="setup-sub">Share this code with your partner</p>
    <div class="setup-code" id="setupCode">------</div>
    <div class="setup-copy" onclick="copyCode()">Tap to copy</div>
    <div class="players-box" id="playersBox"></div>
    <div class="section-label">Spice Level</div>
    <div class="spice-row" id="spiceRow">
        <div class="spice-btn sel" data-v="clean" onclick="pickSpice(this)"><span class="spice-icon">😇</span>Clean</div>
        <div class="spice-btn" data-v="medium" onclick="pickSpice(this)"><span class="spice-icon">😏</span>Medium</div>
        <div class="spice-btn" data-v="spicy" onclick="pickSpice(this)"><span class="spice-icon">🔥</span>Spicy 18+</div>
    </div>
    <div class="section-label">Prompt Pack</div>
    <div class="pack-grid" id="packGrid">
        <div class="pack-btn sel" data-v="classic" onclick="pickPack(this)"><span class="pack-icon">🎯</span>Classic</div>
        <div class="pack-btn" data-v="couples" onclick="pickPack(this)"><span class="pack-icon">💕</span>Couples</div>
    </div>
    <button class="btn btn-create" id="startBtn" onclick="startGame()" disabled style="width:100%;max-width:320px">WAITING FOR PARTNER...</button>
    <div class="error-msg" id="setupErr"></div>
</div>

<!-- GAME -->
<div class="phase" id="phGame">
    <div class="progress"><div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div><div class="prog-txt" id="progTxt">1 / ?</div></div>
    <div class="prompt-card" id="promptCard">
        <div class="prompt-inner truth-style" id="promptInner">
            <div class="type-badge truth" id="typeBadge">TRUTH</div>
            <div class="prompt-text" id="promptText">Loading...</div>
        </div>
    </div>
    <div class="react-row">
        <button class="react-btn" onclick="react('😂')">😂</button>
        <button class="react-btn" onclick="react('❤️')">❤️</button>
        <button class="react-btn" onclick="react('😮')">😮</button>
        <button class="react-btn" onclick="react('🔥')">🔥</button>
    </div>
    <div class="btn-row">
        <button class="fav-btn" id="favBtn" onclick="fav()">♡ Save</button>
        <button class="next-btn" onclick="next()">NEXT →</button>
    </div>
    <div class="partner-status" id="partnerStatus"></div>
</div>

<!-- END -->
<div class="phase" id="phEnd">
    <div class="end-icon">🎉</div>
    <h2 class="end-title">GAME OVER</h2>
    <p class="end-sub" id="endSub">You went through all the prompts!</p>
    <div class="end-stat" id="endStat">0</div>
    <div class="end-stat-lbl">Prompts Completed</div>
    <div class="end-btns">
        <button class="btn btn-join" onclick="location.reload()">NEW GAME</button>
        <button class="btn btn-create" onclick="location.href='/duos.html'">MORE GAMES</button>
    </div>
</div>
</main>

<script>
const BK='https://web-production-519c7.up.railway.app';
const sk=io(BK,{transports:['websocket','polling'],autoConnect:false});
let G={code:null,name:null,num:0,spice:'clean',pack:'classic',q:null,total:0,idx:0,players:[],faved:false};

function show(id){document.querySelectorAll('.phase').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on');}

// === LOBBY ===
function createRoom(){
    const name=document.getElementById('nameInput').value.trim();
    if(!name)return err('lobbyErr','Enter your name');
    G.name=name;
    sk.connect();
    sk.emit('duo-create',{gameType:'truth-or-dare',playerName:name,pack:G.pack,spice:G.spice});
}
function joinRoom(){
    const name=document.getElementById('nameInput').value.trim();
    const code=document.getElementById('codeInput').value.trim().toUpperCase();
    if(!name)return err('lobbyErr','Enter your name');
    if(!code||code.length<4)return err('lobbyErr','Enter room code');
    G.name=name;
    sk.connect();
    sk.emit('duo-join',{code,playerName:name});
}

// === SETUP ===
function pickSpice(el){document.querySelectorAll('.spice-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');G.spice=el.dataset.v;}
function pickPack(el){document.querySelectorAll('.pack-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');G.pack=el.dataset.v;}
function copyCode(){navigator.clipboard.writeText(G.code);document.querySelector('.setup-copy').textContent='Copied!';}
function startGame(){
    sk.emit('duo-start',{code:G.code});
}

function renderPlayers(){
    const box=document.getElementById('playersBox');
    box.innerHTML=G.players.map(n=>`<div class="p-chip${n===G.name?' me':''}">${esc(n)}</div>`).join('');
    if(G.players.length<2) box.innerHTML+='<div class="p-chip waiting">Waiting...</div>';
    const btn=document.getElementById('startBtn');
    if(G.players.length>=2){btn.disabled=false;btn.textContent='START GAME';}
    else{btn.disabled=true;btn.textContent='WAITING FOR PARTNER...';}
}

// === GAME ===
function showQuestion(data){
    G.idx=data.index;G.q=data.question;G.total=data.total;G.faved=false;
    document.getElementById('progFill').style.width=((G.idx/G.total)*100)+'%';
    document.getElementById('progTxt').textContent=(G.idx+1)+' / '+G.total;

    const isTruth=G.q.type==='truth';
    const badge=document.getElementById('typeBadge');
    badge.textContent=isTruth?'TRUTH':'DARE';
    badge.className='type-badge '+(isTruth?'truth':'dare');

    const inner=document.getElementById('promptInner');
    inner.className='prompt-inner '+(isTruth?'truth-style':'dare-style');

    const fill=document.getElementById('progFill');
    fill.className='prog-fill'+(isTruth?'':' dare-fill');

    document.getElementById('promptText').textContent=G.q.text;
    document.getElementById('partnerStatus').textContent='';
    document.getElementById('hdrCode').textContent=G.code;
    document.getElementById('hdrCode').style.display='';
    document.getElementById('favBtn').textContent='♡ Save';
    document.getElementById('favBtn').classList.remove('saved');

    // Re-trigger card animation
    const card=document.getElementById('promptCard');
    card.style.animation='none';
    card.offsetHeight;
    card.style.animation='';

    show('phGame');
}

function next(){sk.emit('duo-next',{code:G.code});}
function fav(){
    G.faved=!G.faved;
    document.getElementById('favBtn').textContent=G.faved?'♥ Saved':'♡ Save';
    document.getElementById('favBtn').classList.toggle('saved',G.faved);
    if(G.faved) sk.emit('duo-favorite',{code:G.code,index:G.idx});
}
function react(emoji){sk.emit('duo-react',{code:G.code,emoji});}

// === SOCKET EVENTS ===
sk.on('duo-created',d=>{
    G.code=d.code;G.num=d.playerNum;G.players=[G.name];
    document.getElementById('setupCode').textContent=d.code;
    renderPlayers();show('phSetup');
});
sk.on('duo-joined',d=>{
    G.code=d.code;G.num=d.playerNum;G.players=d.players;
    if(d.started&&d.question){showQuestion({index:d.currentIndex,question:d.question,total:d.total});return;}
    document.getElementById('setupCode').textContent=d.code;
    renderPlayers();show('phSetup');
});
sk.on('duo-player-joined',d=>{G.players=d.players;renderPlayers();});
sk.on('duo-round',d=>showQuestion(d));
sk.on('duo-reaction',d=>{
    const el=document.createElement('div');el.className='incoming-react';el.textContent=d.emoji;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
});
sk.on('duo-end',d=>{
    document.getElementById('endStat').textContent=d.total;
    document.getElementById('endSub').textContent=`You went through ${d.total} prompts!`;
    show('phEnd');miniConfetti();
});
sk.on('duo-player-left',d=>{
    document.getElementById('partnerStatus').textContent=d.playerName+' disconnected';
});
sk.on('duo-error',d=>err('lobbyErr',d.message)||err('setupErr',d.message));

function err(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;setTimeout(()=>el.textContent='',3000);}}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function miniConfetti(){
    const cl=['#14b8a6','#06b6d4','#f59e0b','#22c55e','#fbbf24','#3b82f6'];
    for(let i=0;i<25;i++){const c=document.createElement('div');c.className='conf';c.style.left=Math.random()*100+'vw';c.style.background=cl[Math.floor(Math.random()*cl.length)];c.style.width=(4+Math.random()*6)+'px';c.style.height=(4+Math.random()*6)+'px';c.style.animationDuration=(2+Math.random()*2)+'s';c.style.animationDelay=(Math.random()*0.4)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000);}
}

// Enter key handlers
document.getElementById('nameInput').addEventListener('keypress',e=>{if(e.key==='Enter')createRoom();});
document.getElementById('codeInput').addEventListener('keypress',e=>{if(e.key==='Enter')joinRoom();});
</script>
