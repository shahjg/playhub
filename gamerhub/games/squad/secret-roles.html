<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Roles - PlayHub</title>
    <meta name="description" content="Secret Roles - A game of hidden loyalties and deduction!">
    <meta name="theme-color" content="#1e40af">
    <link rel="stylesheet" href="/header.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #06081a;
            --card: #0e1225;
            --surface: #141830;
            --accent: #fbbf24;
            --glow: rgba(251, 191, 36, 0.35);
            --good: #3b82f6;
            --good-glow: rgba(59, 130, 246, 0.35);
            --evil: #ef4444;
            --evil-glow: rgba(239, 68, 68, 0.35);
            --gold: #fbbf24;
            --text: #eae8e4;
            --dim: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .scene-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .scene-bg .gradient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 25% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 75% 80%, rgba(239, 68, 68, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 80% 60% at 50% 50%, rgba(251, 191, 36, 0.04) 0%, transparent 60%);
        }

        .scene-bg .particles {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 15% 25%, rgba(251, 191, 36, 0.4) 50%, transparent 50%),
                radial-gradient(1px 1px at 45% 15%, rgba(59, 130, 246, 0.3) 50%, transparent 50%),
                radial-gradient(1px 1px at 75% 35%, rgba(255, 255, 255, 0.2) 50%, transparent 50%),
                radial-gradient(1px 1px at 30% 65%, rgba(239, 68, 68, 0.3) 50%, transparent 50%),
                radial-gradient(1px 1px at 85% 55%, rgba(251, 191, 36, 0.3) 50%, transparent 50%),
                radial-gradient(1px 1px at 55% 80%, rgba(59, 130, 246, 0.2) 50%, transparent 50%),
                radial-gradient(1px 1px at 10% 90%, rgba(255, 255, 255, 0.15) 50%, transparent 50%);
            animation: driftParticles 20s linear infinite;
        }

        @keyframes driftParticles {
            0% { transform: translateY(0); }
            100% { transform: translateY(-30px); }
        }

        /* Main layout */
        main {
            position: relative;
            z-index: 1;
            padding: 70px 16px 32px;
            min-height: 100vh;
            max-width: 680px;
            margin: 0 auto;
        }

        /* Room badge */
        .room-badge {
            display: inline-block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 3px;
            color: var(--accent);
            background: var(--card);
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 5px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        /* ─── Role Card ─── */
        .role-card {
            background: linear-gradient(145deg, var(--card), rgba(59, 130, 246, 0.08));
            border: 2px solid var(--good);
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 0 40px var(--good-glow), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.6s ease;
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--good), transparent);
            transition: background 0.6s;
        }

        .role-card.evil {
            border-color: var(--evil);
            background: linear-gradient(145deg, var(--card), rgba(239, 68, 68, 0.08));
            box-shadow: 0 0 40px var(--evil-glow), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .role-card.evil::before {
            background: linear-gradient(90deg, transparent, var(--evil), transparent);
        }

        .role-icon {
            font-size: 3rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .role-lbl {
            font-size: 0.65rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .role-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--good);
            text-shadow: 0 0 20px var(--good-glow);
            transition: color 0.6s;
        }

        .role-card.evil .role-name {
            color: var(--evil);
            text-shadow: 0 0 20px var(--evil-glow);
        }

        .role-desc {
            font-size: 0.9rem;
            color: var(--dim);
            margin-top: 10px;
            line-height: 1.6;
        }

        .role-info {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--dim);
        }

        .role-info span {
            color: var(--evil);
            font-weight: 700;
        }

        /* ─── Quest Track ─── */
        .quest-track {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quest-marker {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            border: 2px solid var(--border);
            background: var(--card);
            transition: all 0.4s ease;
            position: relative;
        }

        .quest-marker.current {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            animation: questPulse 2s ease-in-out infinite;
        }

        @keyframes questPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
            50% { box-shadow: 0 0 25px rgba(251, 191, 36, 0.6); }
        }

        .quest-marker.success {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-color: var(--good);
            box-shadow: 0 0 15px var(--good-glow);
        }

        .quest-marker.fail {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            border-color: var(--evil);
            box-shadow: 0 0 15px var(--evil-glow);
        }

        .quest-marker .team-size {
            font-size: 0.55rem;
            color: var(--dim);
            line-height: 1;
            font-family: 'Inter', sans-serif;
        }

        /* Connector lines between quest markers */
        .quest-track-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 20px;
        }

        .quest-connector {
            width: 20px;
            height: 2px;
            background: var(--border);
        }

        /* ─── Phase Card ─── */
        .phase-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            animation: fadeSlideIn 0.4s ease-out;
        }

        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .phase-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .phase-desc {
            font-size: 0.9rem;
            color: var(--dim);
            line-height: 1.5;
        }

        /* ─── Leader Section ─── */
        .leader-section {
            background: linear-gradient(135deg, var(--card), rgba(251, 191, 36, 0.05));
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            text-align: center;
        }

        .leader-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--dim);
            margin-bottom: 8px;
        }

        .leader-icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .leader-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        /* ─── Players Grid ─── */
        .players-section { margin-bottom: 16px; }

        .players-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: var(--dim);
            margin-bottom: 12px;
            text-align: center;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .player-btn {
            padding: 14px 10px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .player-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.03));
            pointer-events: none;
        }

        .player-btn:hover:not(:disabled) {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .player-btn.selected {
            border-color: var(--good);
            background: rgba(59, 130, 246, 0.15);
            box-shadow: 0 0 15px var(--good-glow);
        }

        .player-btn.on-team {
            border-color: var(--gold);
            background: rgba(251, 191, 36, 0.12);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2);
        }

        .player-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── Vote Buttons ─── */
        .vote-section {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .vote-btn {
            flex: 1;
            padding: 22px;
            border-radius: 14px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .vote-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .vote-btn.approve {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: #fff;
            box-shadow: 0 4px 20px var(--good-glow);
        }

        .vote-btn.reject {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff;
            box-shadow: 0 4px 20px var(--evil-glow);
        }

        .vote-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .vote-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .vote-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── Quest Vote Buttons ─── */
        .quest-vote-section {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .quest-btn {
            flex: 1;
            padding: 22px;
            border-radius: 14px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .quest-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .quest-btn.success-vote {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: #fff;
            box-shadow: 0 4px 20px var(--good-glow);
        }

        .quest-btn.fail-vote {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff;
            box-shadow: 0 4px 20px var(--evil-glow);
        }

        .quest-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .quest-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── Results Box ─── */
        .results-box {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
            animation: resultPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes resultPop {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .results-box.good-win {
            border-color: var(--good);
            background: linear-gradient(135deg, var(--card), rgba(59, 130, 246, 0.1));
            box-shadow: 0 0 30px var(--good-glow);
        }

        .results-box.evil-win {
            border-color: var(--evil);
            background: linear-gradient(135deg, var(--card), rgba(239, 68, 68, 0.1));
            box-shadow: 0 0 30px var(--evil-glow);
        }

        .results-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .results-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .results-box.good-win .results-title { color: var(--good); }
        .results-box.evil-win .results-title { color: var(--evil); }

        .results-desc {
            font-size: 0.95rem;
            color: var(--dim);
            line-height: 1.5;
        }

        /* ─── Action Button ─── */
        .btn {
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
        }

        .btn-p {
            background: linear-gradient(135deg, #d4a017, #fbbf24, #d4a017);
            background-size: 200% 100%;
            color: #0a0a0a;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.3);
            animation: btnShimmer 3s ease-in-out infinite;
        }

        @keyframes btnShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-p:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(251, 191, 36, 0.4);
        }

        .btn-p:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            animation: none;
        }

        .btn-s {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-s:hover {
            border-color: var(--dim);
            transform: translateY(-1px);
        }

        /* ─── Dramatic Overlay ─── */
        .dramatic-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .dramatic-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .dramatic-overlay .overlay-bg {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
        }

        .dramatic-overlay .overlay-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .dramatic-overlay .d-icon {
            font-size: 4.5rem;
            margin-bottom: 12px;
            animation: dramaticBounce 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes dramaticBounce {
            0% { opacity: 0; transform: scale(0.3) translateY(40px); }
            60% { transform: scale(1.1) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dramatic-overlay .d-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 5px;
            margin-bottom: 8px;
        }

        .dramatic-overlay .d-sub {
            font-size: 1.1rem;
            color: var(--dim);
            max-width: 360px;
            line-height: 1.6;
        }

        .dramatic-overlay.good .d-title { color: var(--good); text-shadow: 0 0 30px var(--good-glow); }
        .dramatic-overlay.good .overlay-bg { background: radial-gradient(ellipse at center, rgba(59,130,246,0.12) 0%, rgba(0,0,0,0.92) 70%); }

        .dramatic-overlay.evil .d-title { color: var(--evil); text-shadow: 0 0 30px var(--evil-glow); }
        .dramatic-overlay.evil .overlay-bg { background: radial-gradient(ellipse at center, rgba(239,68,68,0.12) 0%, rgba(0,0,0,0.92) 70%); }

        .dramatic-overlay.gold .d-title { color: var(--gold); text-shadow: 0 0 30px var(--glow); }
        .dramatic-overlay.gold .overlay-bg { background: radial-gradient(ellipse at center, rgba(251,191,36,0.1) 0%, rgba(0,0,0,0.92) 70%); }

        @keyframes dramaticExit {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.85) translateY(-20px); }
        }

        /* ─── Game Over Modal ─── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .overlay.active { display: flex; }

        .modal {
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .modal-icon {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        .modal h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 5px;
            margin-bottom: 12px;
        }

        .modal.good-win { border-color: var(--good); }
        .modal.good-win h2 { color: var(--good); text-shadow: 0 0 20px var(--good-glow); }

        .modal.evil-win { border-color: var(--evil); }
        .modal.evil-win h2 { color: var(--evil); text-shadow: 0 0 20px var(--evil-glow); }

        .modal p {
            color: var(--dim);
            margin-bottom: 28px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
        }

        .modal-btns .btn {
            flex: 1;
            padding: 14px;
            font-size: 1.1rem;
        }

        /* ─── Role Roles List (game over reveal) ─── */
        .roles-reveal {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .roles-reveal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--dim);
            margin-bottom: 8px;
            text-align: center;
        }

        .role-reveal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            margin: 3px 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .role-reveal-item .r-role {
            font-weight: 700;
        }

        .role-reveal-item .r-role.good-role { color: var(--good); }
        .role-reveal-item .r-role.evil-role { color: var(--evil); }

        /* ─── Floating Role Button ─── */
        .peek-role-btn {
            position: fixed;
            bottom: 80px;
            right: 16px;
            z-index: 100;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 10px 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        .peek-role-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .peek-role-btn.good-team { border-color: rgba(59, 130, 246, 0.4); }
        .peek-role-btn.evil-team { border-color: rgba(239, 68, 68, 0.4); }

        .peek-role-btn .peek-icon { font-size: 1.2rem; }

        /* ─── Role Peek Modal ─── */
        .role-peek-overlay {
            position: fixed;
            inset: 0;
            z-index: 150;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
        }

        .role-peek-overlay.active { display: flex; }

        .role-peek-content {
            animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 380px;
            width: 90%;
        }

        .role-peek-content .role-card {
            margin-bottom: 12px;
        }

        .peek-close-btn {
            width: 100%;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--dim);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .peek-close-btn:hover {
            border-color: var(--dim);
            color: var(--text);
        }

        /* ─── Rejection tracker ─── */
        .rejection-tracker {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .rejection-pip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .rejection-pip.filled {
            background: var(--evil);
            border-color: var(--evil);
            box-shadow: 0 0 8px var(--evil-glow);
        }

        /* ─── Toast ─── */
        .toast-container {
            position: fixed;
            top: 70px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 260px;
            max-width: 360px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.3s ease-out;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .toast-body {
            font-size: 0.8rem;
            color: var(--dim);
        }

        /* ─── Responsive ─── */
        @media (max-width: 480px) {
            main { padding: 60px 10px 24px; }
            .role-name { font-size: 2rem; }
            .quest-marker { width: 46px; height: 46px; font-size: 1.1rem; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
            .vote-btn { padding: 18px; font-size: 1.3rem; }
            .quest-btn { padding: 18px; font-size: 1.2rem; }
            .modal { padding: 28px 20px; }
            .modal h2 { font-size: 2.2rem; }
            .dramatic-overlay .d-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="scene-bg">
    <div class="gradient"></div>
    <div class="particles"></div>
</div>

<div id="site-header" data-back-url="/squad-games" data-back-text="Squad"></div>

<div class="toast-container" id="toastContainer"></div>

<main>
    <div style="text-align:center">
        <span class="room-badge" id="room">------</span>
    </div>

    <!-- Role Card -->
    <div class="role-card" id="roleCard">
        <div class="role-icon" id="roleIconDisplay">&#128737;</div>
        <div class="role-lbl">YOUR IDENTITY</div>
        <div class="role-name" id="roleName">???</div>
        <div class="role-desc" id="roleDesc">Waiting for the game to start...</div>
        <div class="role-info" id="roleInfo" style="display:none"></div>
    </div>

    <!-- Quest Track -->
    <div class="quest-track" id="questTrack"></div>

    <!-- Rejection Tracker -->
    <div class="rejection-tracker" id="rejectionTracker" style="display:none">
        <div class="rejection-pip" id="rej1"></div>
        <div class="rejection-pip" id="rej2"></div>
        <div class="rejection-pip" id="rej3"></div>
        <div class="rejection-pip" id="rej4"></div>
        <div class="rejection-pip" id="rej5"></div>
    </div>

    <!-- Phase Card -->
    <div class="phase-card">
        <div class="phase-title" id="phaseTitle">WAITING</div>
        <div class="phase-desc" id="phaseDesc">Waiting for players...</div>
    </div>

    <!-- Leader -->
    <div class="leader-section" id="leaderSection" style="display:none">
        <div class="leader-title">QUEST LEADER</div>
        <div class="leader-icon" id="leaderIcon">&#9876;</div>
        <div class="leader-name" id="leaderName">Player</div>
    </div>

    <!-- Players -->
    <div class="players-section" id="playersSection" style="display:none">
        <div class="players-title" id="playersTitle">SELECT TEAM MEMBERS</div>
        <div class="players-grid" id="playersGrid"></div>
    </div>

    <!-- Vote Buttons -->
    <div class="vote-section" id="voteSection" style="display:none">
        <button class="vote-btn approve" onclick="vote('approve')">APPROVE</button>
        <button class="vote-btn reject" onclick="vote('reject')">REJECT</button>
    </div>

    <!-- Quest Vote Buttons -->
    <div class="quest-vote-section" id="questVoteSection" style="display:none">
        <button class="quest-btn success-vote" onclick="questVote('success')">SUCCESS</button>
        <button class="quest-btn fail-vote" onclick="questVote('fail')" id="failBtn">FAIL</button>
    </div>

    <!-- Results -->
    <div class="results-box" id="resultsBox" style="display:none">
        <div class="results-icon" id="resultsIcon"></div>
        <div class="results-title" id="resultsTitle">Result</div>
        <div class="results-desc" id="resultsDesc">Description</div>
    </div>

    <!-- Action Button -->
    <button class="btn btn-p" id="actionBtn" onclick="handleAction()" disabled>START GAME</button>
</main>

<!-- Dramatic Overlay -->
<div class="dramatic-overlay" id="dramaticOverlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
        <div class="d-icon" id="dIcon"></div>
        <div class="d-title" id="dTitle"></div>
        <div class="d-sub" id="dSub"></div>
    </div>
</div>

<!-- Floating Role Peek Button -->
<button class="peek-role-btn" id="peekRoleBtn" onclick="showRolePeek()">
    <span class="peek-icon" id="peekIcon">&#128737;</span>
    MY ROLE
</button>

<!-- Role Peek Modal -->
<div class="role-peek-overlay" id="rolePeekOverlay" onclick="closeRolePeek(event)">
    <div class="role-peek-content">
        <div class="role-card" id="peekRoleCard">
            <div class="role-icon" id="peekRoleIcon">&#128737;</div>
            <div class="role-lbl">YOUR IDENTITY</div>
            <div class="role-name" id="peekRoleName">???</div>
            <div class="role-desc" id="peekRoleDesc"></div>
            <div class="role-info" id="peekRoleInfo" style="display:none"></div>
        </div>
        <button class="peek-close-btn" onclick="closeRolePeek()">CLOSE</button>
    </div>
</div>

<!-- Game Over Modal -->
<div class="overlay" id="gameoverOverlay">
    <div class="modal" id="gameoverModal">
        <div class="modal-icon" id="winnerIcon">&#9876;</div>
        <h2 id="winnerTitle">GOOD WINS</h2>
        <p id="winnerDesc">The loyal servants of Arthur have prevailed!</p>
        <div id="rolesReveal"></div>
        <div class="modal-btns">
            <button class="btn btn-s" onclick="location.href='/squad-games.html'">LEAVE</button>
            <button class="btn btn-p" onclick="location.href='/waiting-room.html?room='+window.roomCode">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
// Ensure socket.io is loaded before anything runs
if (typeof io === 'undefined') {
    document.getElementById('phaseDesc').textContent = 'Loading connection...';
    var _ioScript = document.createElement('script');
    _ioScript.src = 'https://cdn.socket.io/4.6.1/socket.io.min.js';
    _ioScript.onload = function() { initGame(); };
    _ioScript.onerror = function() {
        document.getElementById('phaseDesc').textContent = 'Connection failed. Please refresh.';
    };
    document.head.appendChild(_ioScript);
} else {
    initGame();
}

function initGame() {
    const BACKEND_URL = 'https://web-production-519c7.up.railway.app';
    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
    const urlParams = new URLSearchParams(location.search);
    const roomCode = urlParams.get('room') || localStorage.getItem('tempRoomCode');
    const playerName = localStorage.getItem('tempPlayerName');
    document.getElementById('room').textContent = roomCode || '------';
    if (!roomCode || !playerName) location.href = '/lobby.html?game=secret-roles';

    window.roomCode = roomCode;

    const QUEST_SIZES = { 5:[2,3,2,3,3], 6:[2,3,4,3,4], 7:[2,3,3,4,4], 8:[3,4,4,5,5], 9:[3,4,4,5,5], 10:[3,4,4,5,5] };
    const ROLE_ICONS = { 'Merlin':'&#128300;', 'Percival':'&#9876;', 'Loyal Servant':'&#128737;', 'Assassin':'&#128481;', 'Morgana':'&#129497;', 'Mordred':'&#128520;', 'Oberon':'&#128123;', 'Minion':'&#128065;' };
    let state = {
        players: [], role: '', team: 'good', evilPlayers: [],
        phase: 'waiting', quest: 0, questResults: [], leader: '',
        selectedTeam: [], proposedTeam: [], rejections: 0,
        isLeader: false, isOnTeam: false,
        isHost: localStorage.getItem('tempIsHost') === 'true'
    };

    let dramaticTimeout = null;

    socket.on('connect', () => socket.emit('rejoin-room', { roomCode, playerName }));

    socket.on('room-joined', d => {
        state.players = d.room.players || [];
        const me = state.players.find(p => p.name === playerName);
        if (me) state.isHost = me.isHost;
        document.getElementById('actionBtn').disabled = !state.isHost;
        document.getElementById('actionBtn').textContent = state.isHost ? 'START GAME' : 'WAITING FOR HOST...';
        renderQuestTrack();
    });

    socket.on('player-joined', d => { state.players = d.room.players || []; renderQuestTrack(); });
    socket.on('player-disconnected', d => { state.players = d.room.players || []; });

    socket.on('avalon-roles', d => {
        state.role = d.role;
        state.team = d.team;
        state.evilPlayers = d.evilPlayers || [];

        const card = document.getElementById('roleCard');
        card.classList.toggle('evil', d.team === 'evil');
        document.getElementById('roleIconDisplay').innerHTML = ROLE_ICONS[d.role] || '&#128737;';
        document.getElementById('roleName').textContent = d.role.toUpperCase();
        document.getElementById('roleDesc').textContent = getRoleDesc(d.role);

        if (d.evilPlayers && d.evilPlayers.length > 0) {
            document.getElementById('roleInfo').style.display = 'block';
            document.getElementById('roleInfo').innerHTML = 'Evil players: <span>' + d.evilPlayers.join(', ') + '</span>';
        }

        // Show role peek button
        setupRolePeek(d);

        // Show dramatic role reveal
        showDramatic(
            d.team === 'evil' ? 'evil' : 'good',
            ROLE_ICONS[d.role] || '&#128737;',
            d.role.toUpperCase(),
            getRoleDesc(d.role),
            2500
        );
    });

    socket.on('avalon-team-select', d => {
        state.phase = 'team-select';
        state.quest = d.quest;
        state.leader = d.leader;
        state.isLeader = d.leader === playerName;
        state.selectedTeam = [];
        state.rejections = d.rejections || 0;

        document.getElementById('phaseTitle').textContent = 'TEAM SELECTION';
        document.getElementById('phaseDesc').textContent = state.isLeader ? 'Select ' + d.teamSize + ' players for the quest' : 'Waiting for ' + d.leader + ' to select a team';
        document.getElementById('leaderSection').style.display = 'block';
        document.getElementById('leaderName').textContent = d.leader + (state.isLeader ? ' (You)' : '');
        document.getElementById('playersSection').style.display = 'block';
        document.getElementById('playersTitle').textContent = 'SELECT ' + d.teamSize + ' TEAM MEMBERS';
        document.getElementById('voteSection').style.display = 'none';
        document.getElementById('questVoteSection').style.display = 'none';
        document.getElementById('resultsBox').style.display = 'none';
        renderPlayers(d.teamSize);
        renderQuestTrack();
        updateRejectionTracker(d.rejections || 0);

        document.getElementById('actionBtn').textContent = state.isLeader ? 'PROPOSE TEAM' : 'WAITING...';
        document.getElementById('actionBtn').disabled = true;
        document.getElementById('actionBtn').style.display = 'block';
    });

    socket.on('avalon-team-vote', d => {
        state.phase = 'team-vote';
        state.proposedTeam = d.team;

        showDramatic('gold', '&#9878;', 'TEAM PROPOSED', d.team.join(', '), 1500, () => {
            document.getElementById('phaseTitle').textContent = 'TEAM VOTE';
            document.getElementById('phaseDesc').textContent = 'Approve or reject the proposed team';
            document.getElementById('playersSection').style.display = 'block';
            renderProposedTeam(d.team);
            document.getElementById('voteSection').style.display = 'flex';
            document.getElementById('actionBtn').style.display = 'none';
        });
    });

    socket.on('avalon-team-rejected', d => {
        state.rejections = d.rejections;
        updateRejectionTracker(d.rejections);

        showDramatic('evil', '&#10060;', 'TEAM REJECTED', d.approves + ' approved, ' + d.rejects + ' rejected. Rejection ' + d.rejections + '/5', 2000, () => {
            document.getElementById('resultsBox').style.display = 'block';
            document.getElementById('resultsBox').className = 'results-box evil-win';
            document.getElementById('resultsIcon').innerHTML = '&#10060;';
            document.getElementById('resultsTitle').textContent = 'Team Rejected';
            document.getElementById('resultsDesc').textContent = d.approves + ' approve, ' + d.rejects + ' reject. Rejection #' + d.rejections + '/5';
            document.getElementById('voteSection').style.display = 'none';
        });
    });

    socket.on('avalon-quest', d => {
        state.phase = 'quest';
        state.isOnTeam = d.team.includes(playerName);

        showDramatic('gold', '&#9876;', 'QUEST BEGINS', state.isOnTeam ? 'You are on this quest!' : 'The quest team departs...', 1800, () => {
            document.getElementById('phaseTitle').textContent = 'QUEST';
            document.getElementById('phaseDesc').textContent = state.isOnTeam ? 'You are on the quest! Choose wisely.' : 'Awaiting the quest team\'s decision...';
            document.getElementById('voteSection').style.display = 'none';
            document.getElementById('resultsBox').style.display = 'none';
            if (state.isOnTeam) {
                document.getElementById('questVoteSection').style.display = 'flex';
                document.getElementById('failBtn').disabled = state.team === 'good';
            } else {
                document.getElementById('questVoteSection').style.display = 'none';
            }
            document.getElementById('actionBtn').style.display = 'none';
        });
    });

    socket.on('avalon-quest-result', d => {
        state.questResults = d.results;
        const success = d.success;

        showDramatic(
            success ? 'good' : 'evil',
            success ? '&#10004;' : '&#10006;',
            success ? 'QUEST SUCCEEDED' : 'QUEST FAILED',
            'Fails: ' + d.fails + ' / Successes: ' + d.successes,
            2500,
            () => {
                document.getElementById('questVoteSection').style.display = 'none';
                document.getElementById('resultsBox').style.display = 'block';
                document.getElementById('resultsBox').className = 'results-box ' + (success ? 'good-win' : 'evil-win');
                document.getElementById('resultsIcon').innerHTML = success ? '&#10004;' : '&#10006;';
                document.getElementById('resultsTitle').textContent = success ? 'Quest Succeeded!' : 'Quest Failed!';
                document.getElementById('resultsDesc').textContent = 'Fails: ' + d.fails + ' / Success: ' + d.successes;
                renderQuestTrack();
                document.getElementById('actionBtn').style.display = 'block';
                document.getElementById('actionBtn').textContent = state.isHost ? 'NEXT QUEST' : 'WAITING...';
                document.getElementById('actionBtn').disabled = !state.isHost;
            }
        );
    });

    socket.on('avalon-game-over', d => {
        const goodWins = d.winner === 'good';
        const modal = document.getElementById('gameoverModal');
        modal.className = 'modal ' + (goodWins ? 'good-win' : 'evil-win');
        document.getElementById('winnerIcon').innerHTML = goodWins ? '&#9876;' : '&#128481;';
        document.getElementById('winnerTitle').textContent = goodWins ? 'GOOD WINS!' : 'EVIL WINS!';
        document.getElementById('winnerDesc').textContent = goodWins ? 'The loyal servants of Arthur have prevailed!' : 'The minions of Mordred have conquered!';

        // Show roles reveal if available
        const revealDiv = document.getElementById('rolesReveal');
        if (d.roles) {
            let html = '<div class="roles-reveal"><div class="roles-reveal-title">IDENTITY REVEAL</div>';
            Object.entries(d.roles).forEach(([name, info]) => {
                const isEvil = info.team === 'evil';
                html += '<div class="role-reveal-item"><span>' + esc(name) + '</span><span class="r-role ' + (isEvil ? 'evil-role' : 'good-role') + '">' + info.role + '</span></div>';
            });
            html += '</div>';
            revealDiv.innerHTML = html;
        }

        showDramatic(
            goodWins ? 'good' : 'evil',
            goodWins ? '&#127942;' : '&#128128;',
            goodWins ? 'GOOD WINS' : 'EVIL WINS',
            d.reason || '',
            3000,
            () => {
                document.getElementById('gameoverOverlay').classList.add('active');
            }
        );
    });

    socket.on('host-left', () => { location.href = '/squad-games.html'; });

    // ─── Helpers ─────────────────────────────
    function getRoleDesc(role) {
        const descs = {
            'Merlin': 'You know who the evil players are. Stay hidden from the Assassin!',
            'Percival': 'You know who Merlin is. Protect them at all costs.',
            'Loyal Servant': 'You are loyal to Arthur. Help identify the traitors.',
            'Assassin': 'You lead the forces of evil. If good wins, you can guess Merlin to steal victory!',
            'Morgana': 'You appear as Merlin to Percival. Sow confusion.',
            'Mordred': 'You are hidden from Merlin. Use this advantage wisely.',
            'Oberon': 'You are evil but unknown to the other evil players.',
            'Minion': 'You serve the forces of evil. Sabotage the quests.'
        };
        return descs[role] || 'Unknown role';
    }

    function renderQuestTrack() {
        const sizes = QUEST_SIZES[state.players.length] || [2, 3, 2, 3, 3];
        document.getElementById('questTrack').innerHTML = sizes.map((size, i) => {
            let cls = 'quest-marker';
            if (i === state.quest) cls += ' current';
            if (state.questResults[i] === 'success') cls += ' success';
            if (state.questResults[i] === 'fail') cls += ' fail';
            const icon = state.questResults[i] === 'success' ? '&#10004;' : state.questResults[i] === 'fail' ? '&#10006;' : (i + 1);
            return '<div class="' + cls + '">' + icon + '<span class="team-size">' + size + 'p</span></div>';
        }).join('');
    }

    function renderPlayers(teamSize) {
        document.getElementById('playersGrid').innerHTML = state.players.map(p => {
            const selected = state.selectedTeam.includes(p.name);
            return '<button class="player-btn ' + (selected ? 'selected' : '') + '" onclick="window._togglePlayer(\'' + esc(p.name) + '\',' + teamSize + ')" ' + (!state.isLeader ? 'disabled' : '') + '>' + esc(p.name) + (p.name === playerName ? ' (You)' : '') + '</button>';
        }).join('');
    }

    function renderProposedTeam(team) {
        document.getElementById('playersGrid').innerHTML = state.players.map(p =>
            '<div class="player-btn ' + (team.includes(p.name) ? 'on-team' : '') + '" style="cursor:default">' + esc(p.name) + (team.includes(p.name) ? ' &#9876;' : '') + '</div>'
        ).join('');
    }

    function updateRejectionTracker(count) {
        document.getElementById('rejectionTracker').style.display = 'flex';
        for (let i = 1; i <= 5; i++) {
            const pip = document.getElementById('rej' + i);
            if (pip) pip.classList.toggle('filled', i <= count);
        }
    }

    // ─── Dramatic Overlay ─────────────────────
    function showDramatic(type, icon, title, subtitle, duration, callback) {
        const overlay = document.getElementById('dramaticOverlay');
        const content = overlay.querySelector('.overlay-content');

        if (dramaticTimeout) { clearTimeout(dramaticTimeout); dramaticTimeout = null; }

        overlay.className = 'dramatic-overlay ' + type;
        document.getElementById('dIcon').innerHTML = icon;
        document.getElementById('dTitle').textContent = title;
        document.getElementById('dSub').innerHTML = subtitle;

        content.style.animation = 'none';
        content.offsetHeight;
        content.style.animation = '';

        overlay.classList.add('active');

        dramaticTimeout = setTimeout(() => {
            content.style.animation = 'dramaticExit 0.4s ease-in forwards';
            setTimeout(() => {
                overlay.classList.remove('active');
                overlay.className = 'dramatic-overlay';
                content.style.animation = '';
                if (callback) callback();
            }, 400);
        }, duration);
    }

    // ─── Role Peek ────────────────────────────
    function setupRolePeek(d) {
        const btn = document.getElementById('peekRoleBtn');
        btn.style.display = 'flex';
        btn.className = 'peek-role-btn ' + (d.team === 'evil' ? 'evil-team' : 'good-team');
        document.getElementById('peekIcon').innerHTML = ROLE_ICONS[d.role] || '&#128737;';
    }

    window.showRolePeek = function() {
        const overlay = document.getElementById('rolePeekOverlay');
        const card = document.getElementById('peekRoleCard');
        card.classList.toggle('evil', state.team === 'evil');
        document.getElementById('peekRoleIcon').innerHTML = ROLE_ICONS[state.role] || '&#128737;';
        document.getElementById('peekRoleName').textContent = state.role.toUpperCase();
        document.getElementById('peekRoleDesc').textContent = getRoleDesc(state.role);

        const info = document.getElementById('peekRoleInfo');
        if (state.evilPlayers.length > 0) {
            info.style.display = 'block';
            info.innerHTML = 'Evil players: <span>' + state.evilPlayers.join(', ') + '</span>';
        } else {
            info.style.display = 'none';
        }

        overlay.classList.add('active');
    };

    window.closeRolePeek = function(event) {
        if (event && event.target !== document.getElementById('rolePeekOverlay')) return;
        document.getElementById('rolePeekOverlay').classList.remove('active');
    };

    // ─── Toast ────────────────────────────────
    function showToast(title, body) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = '<div class="toast-title">' + title + '</div><div class="toast-body">' + body + '</div>';
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(30px)';
            toast.style.transition = 'all 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    }

    // ─── Global functions ─────────────────────
    window._togglePlayer = function(name, teamSize) {
        if (!state.isLeader) return;
        const idx = state.selectedTeam.indexOf(name);
        if (idx > -1) state.selectedTeam.splice(idx, 1);
        else if (state.selectedTeam.length < teamSize) state.selectedTeam.push(name);
        renderPlayers(teamSize);
        document.getElementById('actionBtn').disabled = state.selectedTeam.length !== teamSize;
    };

    window.vote = function(v) {
        socket.emit('avalon-vote', { roomCode, vote: v });
        document.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
        showToast('Vote Cast', v === 'approve' ? 'You approved the team' : 'You rejected the team');
    };

    window.questVote = function(v) {
        socket.emit('avalon-quest-vote', { roomCode, vote: v });
        document.querySelectorAll('.quest-btn').forEach(b => b.disabled = true);
        showToast('Quest Vote', v === 'success' ? 'You chose success' : 'You chose to sabotage');
    };

    window.handleAction = function() {
        if (state.phase === 'waiting' && state.isHost) socket.emit('avalon-start', { roomCode });
        else if (state.phase === 'team-select' && state.isLeader) {
            socket.emit('avalon-propose-team', { roomCode, team: state.selectedTeam });
            document.getElementById('actionBtn').disabled = true;
        }
        else if (state.isHost) socket.emit('avalon-next', { roomCode });
    };

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    window.addEventListener('beforeunload', () => socket.disconnect());
}
</script>

<script src="/js/engagement.js"></script>
</body>
