<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Struggle - TheGaming.co</title>
    <meta name="description" content="Power Struggle — Bluff, scheme, and seize control in this game of corporate deception.">
    <meta name="theme-color" content="#1a1118">
    <link rel="stylesheet" href="/header.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #0c0a0e;
            --bg-primary: #121016;
            --bg-card: #1a1720;
            --bg-elevated: #221f29;
            --border: rgba(255,255,255,0.06);
            --border-active: rgba(200,170,110,0.3);
            --text-primary: #e8e4ec;
            --text-secondary: rgba(232,228,236,0.6);
            --text-muted: rgba(232,228,236,0.35);
            --gold: #c8aa6e;
            --gold-bright: #dfc185;
            --gold-dim: #8a7444;
            --crimson: #8b1a1a;
            --crimson-bright: #c0392b;
            --crimson-glow: rgba(192,57,43,0.25);
            --accent-duke: #7c3aed;
            --accent-assassin: #c0392b;
            --accent-captain: #2563eb;
            --accent-ambassador: #059669;
            --accent-contessa: #d97706;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139,26,26,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 100%, rgba(200,170,110,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== HEADER ========== */
        .game-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: rgba(12,10,14,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: 0.2s;
        }
        .back-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
        .back-btn svg { width: 12px; height: 12px; }

        .room-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--gold);
            background: var(--bg-card);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(200,170,110,0.15);
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 3px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-title .icon { color: var(--gold); }

        /* ========== MAIN LAYOUT ========== */
        main {
            position: relative;
            z-index: 1;
            padding: 64px 14px 32px;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ========== TURN BANNER ========== */
        .turn-banner {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .turn-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 25%;
            right: 25%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
        }

        .turn-banner.my-turn {
            border-color: var(--gold-dim);
            background: linear-gradient(180deg, rgba(200,170,110,0.06) 0%, var(--bg-card) 100%);
        }
        .turn-banner.my-turn::before {
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: 0 0 12px rgba(200,170,110,0.3);
        }

        .turn-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .turn-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 3px;
            color: var(--text-primary);
        }

        .my-turn .turn-name { color: var(--gold); }

        .turn-subtitle {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ========== MY STATUS ========== */
        .my-status {
            display: flex;
            gap: 12px;
        }

        .my-coins-card {
            flex: 0 0 100px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .coins-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        .coins-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            color: var(--gold);
            line-height: 1;
        }

        .coins-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .my-influence {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .section-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .influence-cards {
            display: flex;
            gap: 8px;
        }

        .influence-card {
            flex: 1;
            padding: 10px 6px;
            border-radius: 8px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            border: 2px solid;
            position: relative;
            transition: 0.3s;
        }

        .influence-card.Duke { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.4); color: var(--accent-duke); }
        .influence-card.Assassin { background: rgba(192,57,43,0.12); border-color: rgba(192,57,43,0.4); color: var(--accent-assassin); }
        .influence-card.Captain { background: rgba(37,99,235,0.12); border-color: rgba(37,99,235,0.4); color: var(--accent-captain); }
        .influence-card.Ambassador { background: rgba(5,150,105,0.12); border-color: rgba(5,150,105,0.4); color: var(--accent-ambassador); }
        .influence-card.Contessa { background: rgba(217,119,6,0.12); border-color: rgba(217,119,6,0.4); color: var(--accent-contessa); }

        .influence-card.dead {
            opacity: 0.3;
            filter: grayscale(0.8);
        }
        .influence-card.dead::after {
            content: '✕';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--danger);
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
        }

        /* ========== PLAYERS ========== */
        .players-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }

        .player-tile {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            transition: 0.2s;
        }

        .player-tile.active-turn {
            border-color: var(--gold-dim);
            background: linear-gradient(135deg, rgba(200,170,110,0.08) 0%, var(--bg-elevated) 100%);
        }

        .player-tile.eliminated {
            opacity: 0.35;
        }

        .player-tile.is-me {
            border-color: rgba(200,170,110,0.15);
        }

        .player-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .player-name-text {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90px;
        }

        .player-tile.active-turn .player-name-text { color: var(--gold); }

        .player-coin-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            color: var(--gold);
        }

        .player-coin-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--gold-dim);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            color: var(--bg-deep);
            font-weight: 800;
        }

        .player-cards-row {
            display: flex;
            gap: 4px;
        }

        .mini-card {
            width: 28px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mini-card.facedown {
            background: linear-gradient(135deg, #2a2535, #1e1a28);
            border: 1px solid rgba(200,170,110,0.15);
            color: var(--gold-dim);
        }
        .mini-card.facedown::after {
            content: '⬥';
            font-size: 0.7rem;
        }

        .mini-card.revealed {
            border: 1px solid;
            font-size: 0.45rem;
            line-height: 1.1;
            text-align: center;
            padding: 2px;
        }
        .mini-card.revealed.Duke { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.4); color: var(--accent-duke); }
        .mini-card.revealed.Assassin { background: rgba(192,57,43,0.2); border-color: rgba(192,57,43,0.4); color: var(--accent-assassin); }
        .mini-card.revealed.Captain { background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.4); color: var(--accent-captain); }
        .mini-card.revealed.Ambassador { background: rgba(5,150,105,0.2); border-color: rgba(5,150,105,0.4); color: var(--accent-ambassador); }
        .mini-card.revealed.Contessa { background: rgba(217,119,6,0.2); border-color: rgba(217,119,6,0.4); color: var(--accent-contessa); }

        /* ========== ACTIONS ========== */
        .actions-section {
            display: none;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .action-btn {
            padding: 14px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            position: relative;
        }

        .action-btn:hover:not(:disabled) {
            border-color: var(--gold-dim);
            background: rgba(200,170,110,0.06);
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .action-btn .action-sub {
            display: block;
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .action-btn .action-cost {
            display: block;
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--gold);
            margin-top: 1px;
        }

        /* Action type colors */
        .action-btn.type-safe { border-left: 3px solid var(--success); }
        .action-btn.type-aggressive { border-left: 3px solid var(--crimson-bright); }
        .action-btn.type-bluff { border-left: 3px solid var(--accent-duke); }
        .action-btn.type-forced { border-left: 3px solid var(--gold); background: rgba(200,170,110,0.05); }
        .action-btn.full-width { grid-column: span 2; }

        /* ========== TARGET SELECTION ========== */
        .target-section {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-active);
            border-radius: 12px;
            padding: 14px;
        }

        .target-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }

        .target-btn {
            padding: 12px 8px;
            background: var(--bg-elevated);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .target-btn:hover { border-color: var(--crimson-bright); }
        .target-btn.selected { border-color: var(--crimson-bright); box-shadow: 0 0 12px var(--crimson-glow); }

        /* ========== RESPONSE (CHALLENGE/BLOCK) ========== */
        .response-section {
            display: none;
        }

        .response-box {
            background: linear-gradient(135deg, rgba(139,26,26,0.08) 0%, var(--bg-card) 100%);
            border: 1px solid rgba(192,57,43,0.25);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
        }

        .response-text {
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 14px;
            color: var(--text-primary);
        }
        .response-text strong { color: var(--gold); font-weight: 700; }
        .response-text em { color: var(--crimson-bright); font-style: normal; font-weight: 600; }

        .response-timer {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .response-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .resp-btn {
            padding: 10px 22px;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .resp-btn.challenge {
            background: linear-gradient(135deg, #c0392b, #962d22);
            color: #fff;
        }
        .resp-btn.challenge:hover { filter: brightness(1.15); }

        .resp-btn.block {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
        }
        .resp-btn.block:hover { filter: brightness(1.15); }

        .resp-btn.allow {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .resp-btn.allow:hover { border-color: var(--text-muted); }

        /* ========== LOSE INFLUENCE ========== */
        .lose-section {
            display: none;
        }

        .lose-box {
            background: linear-gradient(135deg, rgba(239,68,68,0.06) 0%, var(--bg-card) 100%);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
        }

        .lose-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--danger);
            margin-bottom: 4px;
        }

        .lose-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .lose-cards {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .lose-card-btn {
            padding: 14px 20px;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            border: 2px solid;
            transition: 0.2s;
            min-width: 110px;
        }
        .lose-card-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .lose-card-btn.Duke { background: rgba(124,58,237,0.15); border-color: var(--accent-duke); color: var(--accent-duke); }
        .lose-card-btn.Assassin { background: rgba(192,57,43,0.15); border-color: var(--accent-assassin); color: var(--accent-assassin); }
        .lose-card-btn.Captain { background: rgba(37,99,235,0.15); border-color: var(--accent-captain); color: var(--accent-captain); }
        .lose-card-btn.Ambassador { background: rgba(5,150,105,0.15); border-color: var(--accent-ambassador); color: var(--accent-ambassador); }
        .lose-card-btn.Contessa { background: rgba(217,119,6,0.15); border-color: var(--accent-contessa); color: var(--accent-contessa); }

        /* ========== GAME LOG ========== */
        .log-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
        }

        .log-feed {
            max-height: 140px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-elevated) transparent;
        }

        .log-entry {
            font-size: 0.72rem;
            color: var(--text-secondary);
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            line-height: 1.4;
        }
        .log-entry:last-child { border-bottom: none; }

        .log-entry .log-highlight { color: var(--gold); font-weight: 600; }
        .log-entry .log-action { color: var(--text-primary); font-weight: 500; }
        .log-entry .log-danger { color: var(--crimson-bright); font-weight: 600; }

        /* ========== GAME OVER OVERLAY ========== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 20px;
        }
        .overlay.active { display: flex; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-active);
            border-radius: 20px;
            padding: 36px 28px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .modal-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .modal h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .modal .winner-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, var(--gold-dim), var(--gold));
            color: var(--bg-deep);
        }
        .modal-btn.primary:hover { filter: brightness(1.1); }

        .modal-btn.secondary {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 250;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .game-toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.78rem;
            color: var(--text-primary);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .game-toast.error { border-color: rgba(239,68,68,0.3); }

        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .turn-name { font-size: 1.5rem; }
            .players-grid { grid-template-columns: 1fr 1fr; }
            .actions-grid { grid-template-columns: 1fr 1fr; }
            .my-coins-card { flex: 0 0 85px; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="game-header">
    <div class="header-inner">
        <div class="header-left">
            <a href="/squad-games.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Leave
            </a>
            <span class="room-badge" id="roomBadge">------</span>
        </div>
        <span class="header-title"><span class="icon">⚔</span> POWER STRUGGLE</span>
        <div style="width:60px"></div>
    </div>
</header>

<main>
    <!-- Turn Banner -->
    <div class="turn-banner" id="turnBanner">
        <div class="turn-label" id="turnLabel">Current Turn</div>
        <div class="turn-name" id="turnName">Waiting...</div>
        <div class="turn-subtitle" id="turnSubtitle"></div>
    </div>

    <!-- My Status -->
    <div class="my-status">
        <div class="my-coins-card">
            <div class="coins-icon">💰</div>
            <div class="coins-value" id="myCoins">2</div>
            <div class="coins-label">Coins</div>
        </div>
        <div class="my-influence">
            <div class="section-label">Your Influence</div>
            <div class="influence-cards" id="myCards"></div>
        </div>
    </div>

    <!-- Players -->
    <div class="players-section">
        <div class="section-label">Rivals</div>
        <div class="players-grid" id="playersGrid"></div>
    </div>

    <!-- Actions (my turn only) -->
    <div class="actions-section" id="actionsSection">
        <div class="section-label">Choose Your Move</div>
        <div class="actions-grid" id="actionsGrid"></div>
    </div>

    <!-- Target Selection -->
    <div class="target-section" id="targetSection">
        <div class="section-label">Select Target</div>
        <div class="target-grid" id="targetGrid"></div>
    </div>

    <!-- Response (challenge/block) -->
    <div class="response-section" id="responseSection">
        <div class="response-box">
            <div class="response-text" id="responseText">Action pending...</div>
            <div class="response-timer" id="responseTimer">Responding in 10s...</div>
            <div class="response-btns" id="responseBtns"></div>
        </div>
    </div>

    <!-- Lose Influence -->
    <div class="lose-section" id="loseSection">
        <div class="lose-box">
            <div class="lose-title">Lose Influence</div>
            <div class="lose-subtitle" id="loseReason">Choose a card to discard</div>
            <div class="lose-cards" id="loseCards"></div>
        </div>
    </div>

    <!-- Game Log -->
    <div class="log-section">
        <div class="section-label">Intel Feed</div>
        <div class="log-feed" id="logFeed"></div>
    </div>
</main>

<!-- Game Over -->
<div class="overlay" id="gameoverOverlay">
    <div class="modal">
        <div class="modal-icon">👑</div>
        <h2>TOTAL CONTROL</h2>
        <div class="winner-name" id="winnerName">???</div>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="location.href='/squad-games.html'">Leave</button>
            <button class="modal-btn primary" onclick="location.href='/waiting-room.html?room='+roomCode">Play Again</button>
        </div>
    </div>
</div>

<script>
const BACKEND_URL = 'https://web-production-519c7.up.railway.app';
const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });

const urlParams = new URLSearchParams(location.search);
const roomCode = urlParams.get('room') || localStorage.getItem('tempRoomCode');
const playerName = localStorage.getItem('tempPlayerName');

document.getElementById('roomBadge').textContent = roomCode || '------';
if (!roomCode || !playerName) location.href = '/lobby.html?game=power-struggle';

// ========== ACTIONS CONFIG ==========
const ACTIONS = [
    { id: 'income',      name: 'Income',       cost: 0, desc: '+1 coin (no bluff)', needsTarget: false, type: 'safe' },
    { id: 'foreign-aid', name: 'Foreign Aid',   cost: 0, desc: '+2 coins (blockable)', needsTarget: false, type: 'safe' },
    { id: 'tax',         name: 'Tax',           cost: 0, desc: '+3 coins (claim Duke)', needsTarget: false, type: 'bluff', role: 'Duke' },
    { id: 'steal',       name: 'Steal',         cost: 0, desc: 'Take 2 coins (claim Captain)', needsTarget: true, type: 'bluff', role: 'Captain' },
    { id: 'exchange',    name: 'Exchange',      cost: 0, desc: 'Swap cards (claim Ambassador)', needsTarget: false, type: 'bluff', role: 'Ambassador' },
    { id: 'assassinate', name: 'Assassinate',   cost: 3, desc: 'Kill influence (claim Assassin)', needsTarget: true, type: 'aggressive', role: 'Assassin' },
    { id: 'coup',        name: 'Coup',          cost: 7, desc: 'Force lose influence', needsTarget: true, type: 'aggressive', forced: true },
];

// ========== STATE ==========
let state = {
    players: [],
    myCards: [],
    myCoins: 2,
    currentTurn: '',
    phase: 'waiting',
    isMyTurn: false,
    selectedAction: null,
    logs: [],
    pendingAction: null
};

let responseCountdown = null;

// ========== SOCKET EVENTS ==========
socket.on('connect', () => {
    console.log('[PS] Connected, rejoining room...');
    socket.emit('rejoin-room', { roomCode, playerName });
});

socket.on('room-joined', d => {
    console.log('[PS] room-joined:', d.room?.players?.length, 'players');
});

socket.on('ps-state', d => {
    console.log('[PS] ps-state received:', d.currentTurn, 'phase:', d.phase);
    state.players = d.players || [];
    state.currentTurn = d.currentTurn || '';
    state.myCards = d.myCards || [];
    state.myCoins = d.myCoins ?? 2;
    state.phase = d.phase || 'action';
    state.isMyTurn = d.isMyTurn || false;
    state.pendingAction = d.pendingAction;
    if (d.logs) state.logs = d.logs;
    renderAll();
});

socket.on('ps-action-pending', d => {
    console.log('[PS] action-pending:', d);
    state.phase = 'response';
    showResponse(d);
});

socket.on('ps-choose-influence', d => {
    console.log('[PS] choose-influence:', d);
    state.phase = 'lose-influence';
    showLoseInfluence(d.reason);
});

socket.on('ps-log', d => {
    if (d.logs) {
        state.logs = d.logs;
    } else if (d.message) {
        state.logs.push(d.message);
        if (state.logs.length > 20) state.logs = state.logs.slice(-15);
    }
    renderLog();
});

socket.on('ps-game-over', d => {
    document.getElementById('winnerName').textContent = d.winner + ' seizes power';
    document.getElementById('gameoverOverlay').classList.add('active');
});

socket.on('ps-error', d => {
    showToast(d.message);
});

socket.on('host-left', () => {
    showToast('Host left the game');
    setTimeout(() => location.href = '/squad-games.html', 2000);
});

socket.on('disconnect', reason => {
    console.log('[PS] Disconnected:', reason);
});

// ========== RENDER ==========
function renderAll() {
    renderTurn();
    renderMyStatus();
    renderPlayers();
    renderActions();
    renderLog();

    // Hide sections not relevant to current phase
    document.getElementById('targetSection').style.display = 'none';
    if (state.phase !== 'response') document.getElementById('responseSection').style.display = 'none';
    if (state.phase !== 'lose-influence') document.getElementById('loseSection').style.display = 'none';
}

function renderTurn() {
    const banner = document.getElementById('turnBanner');
    const label = document.getElementById('turnLabel');
    const name = document.getElementById('turnName');
    const sub = document.getElementById('turnSubtitle');

    banner.classList.toggle('my-turn', state.isMyTurn);

    if (!state.currentTurn || state.phase === 'waiting') {
        label.textContent = 'Game Starting';
        name.textContent = 'Waiting...';
        sub.textContent = '';
    } else if (state.isMyTurn) {
        label.textContent = 'Your Turn';
        name.textContent = playerName;
        if (state.myCoins >= 10) {
            sub.textContent = 'You must Coup (10+ coins)';
        } else {
            sub.textContent = 'Choose your action';
        }
    } else {
        label.textContent = 'Current Turn';
        name.textContent = state.currentTurn;
        sub.textContent = 'Waiting for their move...';
    }
}

function renderMyStatus() {
    document.getElementById('myCoins').textContent = state.myCoins;

    const cardsEl = document.getElementById('myCards');
    if (!state.myCards.length) {
        cardsEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.75rem;">No cards</div>';
        return;
    }
    cardsEl.innerHTML = state.myCards.map(c => {
        const role = c.card || c.role || '?';
        return `<div class="influence-card ${role} ${c.dead ? 'dead' : ''}">${role}</div>`;
    }).join('');
}

function renderPlayers() {
    const grid = document.getElementById('playersGrid');
    grid.innerHTML = state.players.map(p => {
        const isMe = p.name === playerName;
        const isActive = p.name === state.currentTurn;
        const cls = [
            'player-tile',
            isActive ? 'active-turn' : '',
            p.eliminated ? 'eliminated' : '',
            isMe ? 'is-me' : ''
        ].filter(Boolean).join(' ');

        // Build card display: show dead cards revealed, alive as facedown
        const totalCards = 2;
        const deadCards = p.deadCards || [];
        const aliveCount = p.cardCount || 0;
        let cardsHTML = '';

        for (let i = 0; i < aliveCount; i++) {
            cardsHTML += '<div class="mini-card facedown"></div>';
        }
        deadCards.forEach(card => {
            cardsHTML += `<div class="mini-card revealed ${card}">${card.substring(0, 3)}</div>`;
        });

        return `<div class="${cls}">
            <div class="player-top">
                <span class="player-name-text">${esc(p.name)}${isMe ? ' (You)' : ''}</span>
                <span class="player-coin-badge"><span class="player-coin-icon">$</span>${p.coins}</span>
            </div>
            <div class="player-cards-row">${cardsHTML}</div>
        </div>`;
    }).join('');
}

function renderActions() {
    const section = document.getElementById('actionsSection');
    if (!state.isMyTurn || state.phase !== 'action') {
        section.style.display = 'none';
        return;
    }
    section.style.display = 'block';

    const mustCoup = state.myCoins >= 10;
    const grid = document.getElementById('actionsGrid');

    grid.innerHTML = ACTIONS.map(a => {
        let disabled = false;
        if (mustCoup && a.id !== 'coup') disabled = true;
        if (a.cost > state.myCoins) disabled = true;

        const forceClass = (a.id === 'coup' && mustCoup) ? 'full-width' : '';

        return `<button class="action-btn type-${a.type} ${forceClass}" onclick="selectAction('${a.id}')" ${disabled ? 'disabled' : ''}>
            ${a.name}
            <span class="action-sub">${a.desc}</span>
            ${a.cost ? `<span class="action-cost">${a.cost} coins</span>` : ''}
        </button>`;
    }).join('');
}

function renderLog() {
    const feed = document.getElementById('logFeed');
    if (!state.logs.length) {
        feed.innerHTML = '<div class="log-entry" style="color:var(--text-muted)">No activity yet...</div>';
        return;
    }
    feed.innerHTML = state.logs.slice().reverse().map(msg => {
        // Highlight player names and actions
        const formatted = msg
            .replace(/^([A-Za-z0-9_]+)/, '<span class="log-highlight">$1</span>')
            .replace(/(eliminated|loses|Coup|Assassinate|challenge)/gi, '<span class="log-danger">$1</span>')
            .replace(/(succeeds|collects|Income|Tax|Foreign Aid|Exchange|Steal|blocks)/gi, '<span class="log-action">$1</span>');
        return `<div class="log-entry">${formatted}</div>`;
    }).join('');
    feed.scrollTop = 0;
}

// ========== ACTIONS ==========
function selectAction(id) {
    const action = ACTIONS.find(a => a.id === id);
    if (!action) return;
    state.selectedAction = action;

    if (action.needsTarget) {
        showTargetSelection();
    } else {
        socket.emit('ps-action', { roomCode, action: id });
        document.getElementById('actionsSection').style.display = 'none';
    }
}

function showTargetSelection() {
    const targets = state.players.filter(p => p.name !== playerName && !p.eliminated && p.cardCount > 0);
    const section = document.getElementById('targetSection');
    section.style.display = 'block';

    document.getElementById('targetGrid').innerHTML = targets.map(p =>
        `<button class="target-btn" onclick="selectTarget('${esc(p.name)}')">${esc(p.name)}</button>`
    ).join('');
}

function selectTarget(name) {
    socket.emit('ps-action', { roomCode, action: state.selectedAction.id, target: name });
    document.getElementById('targetSection').style.display = 'none';
    document.getElementById('actionsSection').style.display = 'none';
}

// ========== RESPONSE ==========
function showResponse(d) {
    const section = document.getElementById('responseSection');
    section.style.display = 'block';

    const text = document.getElementById('responseText');
    let html = `<strong>${esc(d.actor)}</strong> uses <em>${esc(d.action)}</em>`;
    if (d.target) html += ` on <strong>${esc(d.target)}</strong>`;
    if (d.claimedRole) html += ` <span style="color:var(--text-muted)">(claims ${d.claimedRole})</span>`;
    text.innerHTML = html;

    // Countdown
    let seconds = 10;
    const timerEl = document.getElementById('responseTimer');
    timerEl.textContent = `Auto-allow in ${seconds}s`;
    if (responseCountdown) clearInterval(responseCountdown);
    responseCountdown = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
            clearInterval(responseCountdown);
            timerEl.textContent = 'Resolving...';
        } else {
            timerEl.textContent = `Auto-allow in ${seconds}s`;
        }
    }, 1000);

    let btns = '';
    if (d.canChallenge) btns += `<button class="resp-btn challenge" onclick="respond('challenge')">⚡ Challenge</button>`;
    if (d.canBlock) btns += `<button class="resp-btn block" onclick="respond('block')">🛡 Block</button>`;
    btns += `<button class="resp-btn allow" onclick="respond('allow')">Allow</button>`;
    document.getElementById('responseBtns').innerHTML = btns;
}

function respond(type) {
    if (responseCountdown) clearInterval(responseCountdown);
    socket.emit('ps-respond', { roomCode, response: type });
    document.getElementById('responseSection').style.display = 'none';
}

// ========== LOSE INFLUENCE ==========
function showLoseInfluence(reason) {
    const section = document.getElementById('loseSection');
    const aliveCards = state.myCards.filter(c => !c.dead);

    if (aliveCards.length <= 1) {
        // Auto-lose only card
        const idx = state.myCards.findIndex(c => !c.dead);
        if (idx >= 0) socket.emit('ps-lose-influence', { roomCode, cardIndex: idx });
        return;
    }

    section.style.display = 'block';
    document.getElementById('loseReason').textContent = reason || 'Choose a card to discard';

    document.getElementById('loseCards').innerHTML = state.myCards.map((c, i) => {
        if (c.dead) return '';
        const role = c.card || c.role || '?';
        return `<button class="lose-card-btn ${role}" onclick="loseInfluence(${i})">${role}</button>`;
    }).join('');
}

function loseInfluence(idx) {
    socket.emit('ps-lose-influence', { roomCode, cardIndex: idx });
    document.getElementById('loseSection').style.display = 'none';
}

// ========== UTILITY ==========
function esc(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function showToast(msg) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'game-toast error';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}

window.addEventListener('beforeunload', () => socket.disconnect());
</script>
<script src="/header.js"></script>
</body>
</html>
