<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Categories – TheGaming.co</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/header.css">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="/js/cosmetics.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#08090e;--bg2:#10121a;--surface:rgba(16,18,26,0.92);
            --accent:#00e5ff;--accent2:#7c4dff;--accent-glow:rgba(0,229,255,0.25);
            --green:#00e676;--red:#ff1744;--gold:#ffd740;--orange:#ff9100;
            --text:#eee;--dim:rgba(255,255,255,0.4);--border:rgba(255,255,255,0.06)
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

        /* === BACKGROUND === */
        .bg-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .bg-grad{position:absolute;inset:0;background:
            radial-gradient(ellipse 60% 40% at 50% -5%,rgba(0,229,255,0.07) 0%,transparent 60%),
            radial-gradient(ellipse 40% 50% at 90% 100%,rgba(124,77,255,0.05) 0%,transparent 50%),var(--bg)}
        .scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,229,255,0.012) 2px 4px);animation:scanScroll 8s linear infinite}
        @keyframes scanScroll{from{transform:translateY(0)}to{transform:translateY(4px)}}

        /* === HEADER === */
        header{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;display:flex;align-items:center;padding:0 14px;background:rgba(8,9,14,0.94);backdrop-filter:blur(20px)}
        header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
        .nav{width:100%;max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .back{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;background:0;border:1px solid var(--border);color:var(--dim);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-decoration:none;transition:.2s}
        .back:hover{color:var(--red);border-color:rgba(255,23,68,0.3)}
        .back svg{width:12px;height:12px}
        .room-badge{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:3px;color:var(--accent);padding:4px 10px;border-radius:4px;border:1px solid rgba(0,229,255,0.15);background:rgba(0,229,255,0.05)}
        .logo-text{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

        /* === MAIN === */
        main{position:relative;z-index:1;padding:62px 14px 28px;min-height:100vh;max-width:520px;margin:0 auto}

        /* Round + Timer row */
        .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .round-pill{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:2px;color:var(--dim);padding:4px 10px;border:1px solid var(--border);border-radius:20px}
        .round-pill b{color:var(--accent)}

        /* TIMER — big prominent */
        .timer-box{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:10px;border:1px solid rgba(0,229,255,0.15);background:rgba(0,229,255,0.04);transition:all .3s}
        .timer-box.warn{border-color:rgba(255,145,0,0.3);background:rgba(255,145,0,0.06)}
        .timer-box.danger{border-color:rgba(255,23,68,0.4);background:rgba(255,23,68,0.08);animation:tmrPulse .4s ease infinite}
        @keyframes tmrPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
        .timer-icon{font-size:1rem}
        .timer-num{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--accent);letter-spacing:2px;min-width:28px;text-align:center}
        .timer-box.warn .timer-num{color:var(--orange)}
        .timer-box.danger .timer-num{color:var(--red)}

        /* CATEGORY CARD */
        .cat-card{position:relative;border-radius:18px;padding:30px 20px 26px;text-align:center;margin-bottom:18px;overflow:hidden;
            background:linear-gradient(160deg,rgba(0,229,255,0.06) 0%,rgba(124,77,255,0.04) 100%);
            border:1px solid rgba(0,229,255,0.12)}
        .cat-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
        .cat-label{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:5px;color:var(--dim);margin-bottom:10px;text-transform:uppercase}
        .cat-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,8vw,3.8rem);letter-spacing:4px;line-height:1;color:#fff;text-shadow:0 0 40px var(--accent-glow);animation:catReveal .4s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes catReveal{from{opacity:0;transform:scale(0.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

        /* INPUT */
        .input-wrap{margin-bottom:16px}
        .input-row{display:flex;gap:8px}
        .answer-input{flex:1;padding:16px 18px;font-size:1.1rem;font-family:'Inter',sans-serif;font-weight:700;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;outline:none;transition:.3s}
        .answer-input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(0,229,255,0.1);background:rgba(0,229,255,0.03)}
        .answer-input::placeholder{color:rgba(255,255,255,0.18);font-weight:500}
        .answer-input:disabled{opacity:.3}
        .go-btn{padding:16px 24px;font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;cursor:pointer;transition:.2s;box-shadow:0 4px 20px var(--accent-glow);min-width:64px}
        .go-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px var(--accent-glow)}
        .go-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
        .feedback{text-align:center;min-height:20px;font-size:.8rem;font-weight:700;margin-top:6px}
        .feedback.ok{color:var(--green)}.feedback.bad{color:var(--red)}

        /* ANSWER FEED */
        .feed{margin-bottom:18px}
        .feed-hdr{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:3px;color:var(--dim);margin-bottom:8px;text-transform:uppercase}
        .feed-list{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto}
        .feed-list::-webkit-scrollbar{width:3px}.feed-list::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
        .f-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;animation:fSlide .25s ease-out}
        @keyframes fSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        .f-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.65rem;color:#fff;flex-shrink:0}
        .f-body{flex:1;min-width:0}
        .f-name{font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:1px}
        .f-ans{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .f-chal{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--red);cursor:pointer;padding:4px 8px;border:1px solid rgba(255,23,68,0.25);border-radius:5px;background:rgba(255,23,68,0.06);transition:.2s;flex-shrink:0}
        .f-chal:hover{background:rgba(255,23,68,0.14)}
        .f-empty{text-align:center;padding:20px;color:rgba(255,255,255,0.12);font-size:.8rem}

        /* SCOREBOARD */
        .sb{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;backdrop-filter:blur(10px)}
        .sb-hdr{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:3px;color:var(--dim);margin-bottom:10px;text-transform:uppercase}
        .sb-list{display:flex;flex-direction:column;gap:5px}
        .s-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.015);border:1px solid transparent;border-radius:8px;transition:.3s}
        .s-row.lead{background:rgba(255,215,64,0.05);border-color:rgba(255,215,64,0.12)}
        .s-rank{font-family:'Orbitron',monospace;font-size:.75rem;width:24px;color:var(--dim);font-weight:800}
        .s-rank.g{color:var(--gold)}
        .s-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.65rem;color:#fff;flex-shrink:0}
        .s-name{flex:1;font-weight:600;font-size:.85rem}.s-name .u{color:var(--accent);font-size:.6rem;font-weight:700}
        .s-pts{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:var(--accent)}
        .s-row.lead .s-pts{color:var(--gold)}
        .av-1{background:#00e5ff}.av-2{background:#7c4dff}.av-3{background:#2979ff}
        .av-4{background:#00e676}.av-5{background:#ff9100}.av-6{background:#ff4081}
        .av-7{background:#00bfa5}.av-8{background:#ff1744}

        /* OVERLAYS */
        .ov{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(8px)}
        .ov.on{display:flex}
        .ov-bg{position:absolute;inset:0;background:rgba(0,0,0,0.88)}
        .ov-card{position:relative;width:100%;max-width:380px;border-radius:20px;padding:28px 22px;text-align:center;overflow:hidden}
        .ov-card::before{content:'';position:absolute;inset:0;z-index:0}

        /* Challenge */
        .chal-card{background:linear-gradient(180deg,#1a0a0a,var(--bg));border:2px solid var(--red)}
        .chal-card::before{background:radial-gradient(ellipse at 50% 0%,rgba(255,23,68,0.1),transparent 60%)}
        .chal-card h2{font-family:'Orbitron',monospace;font-size:1.1rem;letter-spacing:4px;color:var(--red);margin-bottom:10px;position:relative}
        .chal-card p{color:var(--dim);font-size:.85rem;margin-bottom:10px;position:relative}
        .chal-word{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--accent);padding:12px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);border-radius:10px;margin:10px 0;position:relative}
        .vote-row{display:flex;gap:10px;position:relative}
        .v-btn{flex:1;padding:12px;font-family:'Orbitron',monospace;font-size:.7rem;font-weight:800;letter-spacing:2px;border:none;border-radius:10px;cursor:pointer;transition:.2s}
        .v-ok{background:var(--green);color:#000}.v-no{background:var(--red);color:#fff}
        .v-btn:hover{transform:translateY(-2px)}.v-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

        /* Countdown */
        .cd-ov{z-index:250}.cd-ov .ov-bg{background:rgba(0,0,0,0.94)}
        .cd-num{font-family:'Orbitron',monospace;font-size:10rem;font-weight:900;color:var(--accent);text-shadow:0 0 80px var(--accent-glow);animation:cdPop .8s cubic-bezier(0.34,1.56,0.64,1);position:relative}
        @keyframes cdPop{from{transform:scale(0.3);opacity:0}to{transform:scale(1);opacity:1}}

        /* Game Over */
        .go-card{background:linear-gradient(180deg,#1a1508,var(--bg));border:2px solid var(--gold)}
        .go-card::before{background:radial-gradient(ellipse at 50% 0%,rgba(255,215,64,0.1),transparent 60%)}
        .go-crown{font-size:3rem;position:relative;animation:crBounce 1.5s ease infinite}
        @keyframes crBounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
        .go-title{font-family:'Orbitron',monospace;font-size:1rem;letter-spacing:5px;color:var(--gold);margin-bottom:4px;position:relative}
        .go-winner{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:#fff;margin-bottom:16px;position:relative}
        .go-card .sb{margin-bottom:16px}
        .go-btns{display:flex;gap:8px;position:relative}
        .go-btns button{flex:1;padding:12px;font-family:'Orbitron',monospace;font-size:.65rem;font-weight:800;letter-spacing:2px;border:none;border-radius:10px;cursor:pointer;transition:.2s}
        .b-leave{background:rgba(255,255,255,0.04);border:1px solid var(--border)!important;color:var(--dim)}
        .b-leave:hover{border-color:var(--accent)!important;color:var(--accent)}
        .b-again{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
        .b-again:hover{transform:translateY(-2px)}

        /* +1 Popup */
        .pt-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;color:var(--green);z-index:180;pointer-events:none;animation:ptUp .7s ease-out forwards;text-shadow:0 0 30px rgba(0,230,118,0.5)}
        @keyframes ptUp{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}30%{transform:translate(-50%,-70%) scale(1.4)}100%{opacity:0;transform:translate(-50%,-130%) scale(1)}}

        /* Confetti */
        @keyframes confFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
        .conf{position:fixed;top:0;z-index:301;animation:confFall 3s linear forwards;pointer-events:none;border-radius:2px}

        /* Lives bar */
        .lives-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
        .life-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:.7rem;font-weight:700;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--dim);transition:.3s}
        .life-chip.me{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.05)}
        .life-chip.dead{opacity:.3;text-decoration:line-through;border-color:var(--red)}
        .life-hearts{color:var(--red);font-size:.7rem;letter-spacing:1px}

        /* Eliminated banner */
        .elim-banner{display:none;text-align:center;padding:16px;margin-bottom:14px;border-radius:12px;background:rgba(255,23,68,0.08);border:1px solid rgba(255,23,68,0.2)}
        .elim-banner.on{display:block;animation:fadeIn .4s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .elim-banner .elim-title{font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:3px;color:var(--red);margin-bottom:4px}
        .elim-banner .elim-sub{font-size:.75rem;color:var(--dim)}

        /* Elimination round-end overlay */
        .elim-card{background:linear-gradient(180deg,#1a0505,var(--bg));border:2px solid var(--red)}
        .elim-card::before{background:radial-gradient(ellipse at 50% 0%,rgba(255,23,68,0.12),transparent 60%)}
        .elim-skull{font-size:3rem;margin-bottom:8px;position:relative}
        .elim-msg{font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:3px;color:var(--red);margin-bottom:8px;position:relative}
        .elim-names{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:#fff;position:relative;margin-bottom:4px}
        .elim-lives-left{font-size:.75rem;color:var(--dim);position:relative}

        @media(max-width:400px){
            .cat-name{font-size:2.2rem}
            .answer-input{padding:13px 14px;font-size:1rem}
            .cd-num{font-size:7rem}
        }
    </style>
</head>
<body>
<div class="bg-wrap"><div class="bg-grad"></div><div class="scanline"></div></div>

<header><nav class="nav">
    <div style="display:flex;align-items:center;gap:8px">
        <a href="/squad-games.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
        <span class="room-badge" id="roomBadge">------</span>
    </div>
    <span class="logo-text">CATEGORIES</span>
    <div class="timer-box" id="timerBox">
        <span class="timer-icon">⏱</span>
        <span class="timer-num" id="timerNum">--</span>
    </div>
</nav></header>

<main>
    <div class="top-bar">
        <div class="round-pill">RND <b id="roundNum">1</b> / <b id="totalRounds">10</b></div>
    </div>

    <!-- Lives bar (elimination mode only) -->
    <div class="lives-bar" id="livesBar" style="display:none"></div>

    <!-- Eliminated banner -->
    <div class="elim-banner" id="elimBanner">
        <div class="elim-title">ELIMINATED</div>
        <div class="elim-sub">You're now spectating</div>
    </div>

    <div class="cat-card">
        <div class="cat-label">Name a...</div>
        <div class="cat-name" id="catName">WAITING</div>
    </div>

    <div class="input-wrap">
        <div class="input-row">
            <input type="text" class="answer-input" id="answerInput" placeholder="Type fast..." autocomplete="off" maxlength="50">
            <button class="go-btn" id="goBtn" onclick="submitAnswer()">GO</button>
        </div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="feed">
        <div class="feed-hdr">Answers</div>
        <div class="feed-list" id="feedList">
            <div class="f-empty">First to answer scores...</div>
        </div>
    </div>

    <div class="sb">
        <div class="sb-hdr">Scoreboard</div>
        <div class="sb-list" id="scoreList"></div>
    </div>
</main>

<!-- Challenge -->
<div class="ov" id="chalOv">
    <div class="ov-bg"></div>
    <div class="ov-card chal-card">
        <h2>CHALLENGE</h2>
        <p><span id="chalWho">Player</span> is challenging:</p>
        <div class="chal-word" id="chalWord">Answer</div>
        <p>Valid <span id="chalCat" style="color:var(--accent)">category</span>?</p>
        <div class="vote-row">
            <button class="v-btn v-ok" onclick="voteChallenge('valid')">VALID</button>
            <button class="v-btn v-no" onclick="voteChallenge('invalid')">INVALID</button>
        </div>
    </div>
</div>

<!-- Elimination Round Result -->
<div class="ov" id="elimOv">
    <div class="ov-bg"></div>
    <div class="ov-card elim-card">
        <div class="elim-skull">💀</div>
        <div class="elim-msg" id="elimOvMsg">ELIMINATED</div>
        <div class="elim-names" id="elimOvNames">Player</div>
        <div class="elim-lives-left" id="elimOvSub"></div>
    </div>
</div>

<!-- Countdown -->
<div class="ov cd-ov" id="cdOv">
    <div class="ov-bg"></div>
    <div class="cd-num" id="cdNum">3</div>
</div>

<!-- Game Over -->
<div class="ov" id="goOv">
    <div class="ov-bg"></div>
    <div class="ov-card go-card">
        <div class="go-crown">👑</div>
        <div class="go-title">WINNER</div>
        <div class="go-winner" id="goWinner">Player</div>
        <div class="sb"><div class="sb-hdr">Final</div><div class="sb-list" id="goScores"></div></div>
        <div class="go-btns">
            <button class="b-leave" onclick="location.href='/squad-games.html'">LEAVE</button>
            <button class="b-again" onclick="location.href='/waiting-room.html?room='+S.room">AGAIN</button>
        </div>
    </div>
</div>

<script>
const BK='https://web-production-519c7.up.railway.app';
const S={room:null,name:null,sk:null,t:0,ti:null,cat:null,feed:[],scores:{},players:[],playerData:{},tMax:15,mode:'classic',lives:{},eliminated:[],alive:[],amDead:false,isHost:localStorage.getItem('tempIsHost')==='true'};

const up=new URLSearchParams(location.search);
S.room=up.get('room')||localStorage.getItem('tempRoomCode');
S.name=localStorage.getItem('tempPlayerName')||localStorage.getItem('playerName');
if(!S.room||!S.name){S.room=S.room||sessionStorage.getItem('roomCode');S.name=S.name||sessionStorage.getItem('playerName');}
if(!S.room||!S.name) location.href='/lobby.html?game=categories';
document.getElementById('roomBadge').textContent=S.room||'------';

S.sk=io(BK,{transports:['websocket','polling']});
const _isPrem=localStorage.getItem('tempIsPremium')==='true';
const _cosm=JSON.parse(localStorage.getItem('tempCosmetics')||'null');
S.sk.on('connect',()=>S.sk.emit('rejoin-room',{roomCode:S.room,playerName:S.name,isPremium:_isPrem,cosmetics:_cosm}));
function storePlayerData(players){S.players=players.map(p=>p.name);players.forEach(p=>{S.playerData[p.name]={isPremium:p.isPremium||false,cosmetics:p.cosmetics||null};});}
S.sk.on('room-joined',d=>{storePlayerData(d.room.players||[]);const me=(d.room.players||[]).find(p=>p.name===S.name);if(me)S.isHost=!!me.isHost;});
S.sk.on('player-joined',d=>{storePlayerData(d.room.players||[]);});
S.sk.on('player-disconnected',d=>{storePlayerData(d.room.players||[]);});

// === ROUND START ===
S.sk.on('categories-round-start',d=>{
    hideOv('cdOv');hideOv('elimOv');
    const el=document.getElementById('catName');
    el.textContent=d.displayName;el.style.animation='none';el.offsetHeight;el.style.animation='catReveal .4s cubic-bezier(0.34,1.56,0.64,1)';
    document.getElementById('roundNum').textContent=d.roundNumber;
    S.cat=d.displayName;S.feed=[];S.tMax=d.timeLimit;
    S.mode=d.mode||'classic';
    if(d.lives) S.lives=d.lives;
    if(d.eliminated) S.eliminated=d.eliminated;
    if(d.alivePlayers) S.alive=d.alivePlayers;
    S.amDead=S.eliminated.includes(S.name);
    renderFeed();updateScores(d.scores);
    S.t=d.timeLimit;startTimer();
    const inp=document.getElementById('answerInput');
    if(S.amDead){
        inp.disabled=true;inp.placeholder='Spectating...';
        document.getElementById('goBtn').disabled=true;
        document.getElementById('elimBanner').classList.add('on');
    } else {
        inp.value='';inp.disabled=false;inp.placeholder='Type fast...';inp.focus();
        document.getElementById('goBtn').disabled=false;
        document.getElementById('elimBanner').classList.remove('on');
    }
    renderLives();
});

// === VALID ANSWER ===
S.sk.on('categories-valid-answer',d=>{
    S.feed.unshift({p:d.playerName,a:d.answer});
    if(S.feed.length>12)S.feed.pop();
    renderFeed();updateScores(d.scores);
    if(d.playerName===S.name) ptPop();
});

// === MY RESULT ===
S.sk.on('categories-answer-result',d=>{
    const fb=document.getElementById('feedback');
    fb.textContent=d.valid?'✓ '+d.message:'✗ '+d.message;
    fb.className=d.valid?'feedback ok':'feedback bad';
    if(d.valid) document.getElementById('answerInput').value='';
    setTimeout(()=>{fb.textContent='';fb.className='feedback';},1800);
    document.getElementById('answerInput').focus();
});

// === CHALLENGE ===
S.sk.on('categories-challenge-start',d=>{
    document.getElementById('chalWho').textContent=d.challenger;
    document.getElementById('chalWord').textContent=d.challengedAnswer;
    document.getElementById('chalCat').textContent=d.category;
    document.querySelectorAll('.v-btn').forEach(b=>b.disabled=false);
    showOv('chalOv');
});
S.sk.on('categories-challenge-result',d=>{
    hideOv('chalOv');updateScores(d.scores);
    const fb=document.getElementById('feedback');
    fb.textContent=d.successful?`"${d.challengedAnswer}" removed!`:`"${d.challengedAnswer}" stands.`;
    fb.className=d.successful?'feedback ok':'feedback bad';
    setTimeout(()=>{fb.textContent='';fb.className='feedback';},2500);
});

// === ROUND END / GAME OVER ===
S.sk.on('categories-round-end',d=>{
    updateScores(d.scores);stopTimer();
    if(d.lives) S.lives=d.lives;
    if(d.eliminated) S.eliminated=d.eliminated;
    if(d.alivePlayers) S.alive=d.alivePlayers;
    S.amDead=S.eliminated.includes(S.name);
    renderLives();
    // Show elimination overlay if someone was eliminated
    if(d.eliminatedThisRound && d.eliminatedThisRound.length>0){
        const names=d.eliminatedThisRound.join(', ');
        document.getElementById('elimOvNames').textContent=names;
        document.getElementById('elimOvMsg').textContent=d.eliminatedThisRound.includes(S.name)?'YOU\'RE OUT':'ELIMINATED';
        document.getElementById('elimOvSub').textContent=S.alive.length+' player'+(S.alive.length!==1?'s':'')+' remaining';
        showOv('elimOv');
        setTimeout(()=>{hideOv('elimOv');showCd(d.nextRoundIn>2?d.nextRoundIn-2:1);},2000);
    } else {
        showCd(d.nextRoundIn);
    }
});
S.sk.on('categories-game-over',d=>{
    stopTimer();
    document.getElementById('goWinner').textContent=d.winner==='TIE'?'TIE!':d.winner+' WINS!';
    renderSb(d.finalScores,'goScores');showOv('goOv');confetti();
});
S.sk.on('error',d=>{
    const fb=document.getElementById('feedback');fb.textContent=d.message;fb.className='feedback bad';
    setTimeout(()=>{fb.textContent='';fb.className='feedback';},2500);
});

// === FUNCTIONS ===
function submitAnswer(){
    const v=document.getElementById('answerInput').value.trim();
    if(!v)return;
    S.sk.emit('categories-answer',{roomCode:S.room,answer:v});
}

function startTimer(){
    stopTimer();
    const el=document.getElementById('timerNum');
    const box=document.getElementById('timerBox');
    el.textContent=S.t;box.className='timer-box';
    S.ti=setInterval(()=>{
        S.t--;el.textContent=Math.max(0,S.t);
        box.className='timer-box'+(S.t<=3?' danger':S.t<=5?' warn':'');
        if(S.t<=0){stopTimer();if(S.isHost)S.sk.emit('categories-time-up',{roomCode:S.room});}
    },1000);
}
function stopTimer(){if(S.ti){clearInterval(S.ti);S.ti=null;}}

function renderFeed(){
    const el=document.getElementById('feedList');
    if(!S.feed.length){el.innerHTML='<div class="f-empty">First to answer scores...</div>';return;}
    el.innerHTML=S.feed.map((e,i)=>{
        const av='av-'+((S.players.indexOf(e.p)%8)+1);
        const canChal=e.p!==S.name;
        return `<div class="f-row">
            <div class="f-avatar ${av}">${e.p.charAt(0).toUpperCase()}</div>
            <div class="f-body"><div class="f-name">${pName(e.p)}</div><div class="f-ans">${esc(e.a)}</div></div>
            ${canChal?`<button class="f-chal" onclick="doChallenge('${esc(e.a)}','${esc(e.p)}')">CHALLENGE</button>`:''}
        </div>`;
    }).join('');
}

function updateScores(sc){S.scores=sc;renderSb(sc,'scoreList');}

function renderSb(sc,id){
    const el=document.getElementById(id);
    const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
    el.innerHTML=sorted.map(([n,s],i)=>{
        const av='av-'+((i%8)+1);
        return `<div class="s-row${i===0&&s>0?' lead':''}">
            <div class="s-rank${i===0?' g':''}">${i<3?['🥇','🥈','🥉'][i]:(i+1)}</div>
            <div class="s-av ${av}">${n.charAt(0).toUpperCase()}</div>
            <div class="s-name">${pName(n)}${n===S.name?' <span class="u">(YOU)</span>':''}</div>
            <div class="s-pts">${s}</div>
        </div>`;
    }).join('');
}

function renderLives(){
    const bar=document.getElementById('livesBar');
    if(S.mode!=='elimination'){bar.style.display='none';return;}
    bar.style.display='flex';
    const allP=[...S.alive,...S.eliminated];
    bar.innerHTML=allP.map(p=>{
        const dead=S.eliminated.includes(p);
        const lives=S.lives[p]||0;
        const isMe=p===S.name;
        const hearts=dead?'💀':'❤️'.repeat(Math.max(0,lives));
        return `<div class="life-chip${isMe?' me':''}${dead?' dead':''}">
            ${esc(p)} <span class="life-hearts">${hearts}</span>
        </div>`;
    }).join('');
}

function doChallenge(answer,player){
    S.sk.emit('categories-challenge',{roomCode:S.room,answer:answer,challengedPlayer:player});
}
function voteChallenge(v){
    S.sk.emit('categories-challenge-vote',{roomCode:S.room,vote:v});
    document.querySelectorAll('.v-btn').forEach(b=>b.disabled=true);
}

function showOv(id){document.getElementById(id).classList.add('on');}
function hideOv(id){document.getElementById(id).classList.remove('on');}
function showCd(s){
    showOv('cdOv');const el=document.getElementById('cdNum');let c=s;el.textContent=c;
    const ci=setInterval(()=>{c--;if(c<=0){clearInterval(ci);hideOv('cdOv');}else{el.textContent=c;el.style.animation='none';el.offsetHeight;el.style.animation='cdPop .8s cubic-bezier(0.34,1.56,0.64,1)';}},1000);
}

function ptPop(){const p=document.createElement('div');p.className='pt-pop';p.textContent='+1';document.body.appendChild(p);setTimeout(()=>p.remove(),900);}

function confetti(){
    const cl=['#00e5ff','#7c4dff','#00e676','#ffd740','#ff4081','#ff9100'];
    for(let i=0;i<45;i++){const c=document.createElement('div');c.className='conf';c.style.left=Math.random()*100+'vw';c.style.background=cl[Math.floor(Math.random()*cl.length)];c.style.width=(5+Math.random()*8)+'px';c.style.height=(5+Math.random()*8)+'px';c.style.animationDuration=(2+Math.random()*2)+'s';c.style.animationDelay=(Math.random()*0.5)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),5000);}
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function pName(name){
    const pd=S.playerData[name];
    if(pd&&pd.cosmetics&&window.TGCOCosmetics) return window.TGCOCosmetics.renderInlineName({name,cosmetics:pd.cosmetics,isPremium:pd.isPremium});
    return esc(name);
}

document.getElementById('answerInput').addEventListener('keypress',e=>{if(e.key==='Enter')submitAnswer();});
window.addEventListener('beforeunload',()=>S.sk.disconnect());
</script>
<script src="/header.js"></script>
