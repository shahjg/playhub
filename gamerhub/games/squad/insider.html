<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insider - PlayHub</title>
    <meta name="description" content="Insider - Find the secret word, then find the insider!">
    <meta name="theme-color" content="#eab308">
    <link rel="stylesheet" href="/header.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #08060e;
            --card: #12101c;
            --surface: #1a1728;
            --accent: #eab308;
            --accent-glow: rgba(234, 179, 8, 0.3);
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.3);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.3);
            --text: #eae8e4;
            --dim: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.07);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Background */
        .scene-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .scene-bg .glow {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 50% 40% at 30% 20%, rgba(234, 179, 8, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 50% at 70% 75%, rgba(168, 85, 247, 0.05) 0%, transparent 70%);
        }
        .scene-bg .dots {
            position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(234,179,8,0.35) 50%, transparent 50%),
                radial-gradient(1px 1px at 60% 15%, rgba(168,85,247,0.3) 50%, transparent 50%),
                radial-gradient(1px 1px at 80% 45%, rgba(255,255,255,0.15) 50%, transparent 50%),
                radial-gradient(1px 1px at 40% 70%, rgba(234,179,8,0.25) 50%, transparent 50%),
                radial-gradient(1px 1px at 90% 80%, rgba(168,85,247,0.2) 50%, transparent 50%);
            animation: driftDots 25s linear infinite;
        }
        @keyframes driftDots { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }

        /* Layout */
        main { position: relative; z-index: 1; padding: 70px 16px 32px; min-height: 100vh; max-width: 640px; margin: 0 auto; }
        .room-badge { display: inline-block; font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 3px; color: var(--accent); background: var(--card); border: 1px solid rgba(234,179,8,0.15); padding: 5px 14px; border-radius: 6px; margin-bottom: 16px; }

        /* Role Card */
        .role-card {
            background: linear-gradient(145deg, var(--card), rgba(234,179,8,0.06));
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 0 35px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
            transition: all 0.5s;
        }
        .role-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        .role-card.master { border-color: var(--purple); box-shadow: 0 0 35px var(--purple-glow); }
        .role-card.master::before { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
        .role-card.insider-role { border-color: var(--red); box-shadow: 0 0 35px var(--red-glow); }
        .role-card.insider-role::before { background: linear-gradient(90deg, transparent, var(--red), transparent); }

        .role-icon { font-size: 2.5rem; margin-bottom: 8px; }
        .role-lbl { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 6px; }
        .role-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); transition: color 0.5s; }
        .role-card.master .role-name { color: var(--purple); text-shadow: 0 0 15px var(--purple-glow); }
        .role-card.insider-role .role-name { color: var(--red); text-shadow: 0 0 15px var(--red-glow); }
        .role-desc { font-size: 0.85rem; color: var(--dim); margin-top: 10px; line-height: 1.6; }

        /* Word Card */
        .word-card {
            background: linear-gradient(145deg, var(--card), rgba(234,179,8,0.03));
            border: 1px solid rgba(234,179,8,0.12);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .word-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.4; }
        .word-lbl { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
        .word-txt { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 25px var(--accent-glow); }
        .word-hidden { color: var(--dim); text-shadow: none; }

        /* Timer */
        .timer-section { margin-bottom: 20px; }
        .timer-txt { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); margin-bottom: 8px; }
        .timer-txt.danger { color: var(--red); animation: timerPulse 0.6s infinite; }
        @keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .timer-track { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
        .timer-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--accent), var(--green)); border-radius: 3px; transition: width 0.3s linear; }

        /* Phase Info */
        .phase-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .phase-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); margin-bottom: 6px; }
        .phase-desc { font-size: 0.85rem; color: var(--dim); line-height: 1.5; }

        /* Guess Input */
        .guess-wrap { margin-bottom: 20px; display: flex; gap: 10px; }
        .guess-input {
            flex: 1; padding: 14px 16px; background: var(--surface); border: 2px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 1.1rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s;
        }
        .guess-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .guess-input::placeholder { color: rgba(255,255,255,0.2); text-transform: none; letter-spacing: 0; }
        .guess-btn {
            padding: 14px 20px; background: linear-gradient(135deg, var(--accent), #ca8a04);
            border: none; border-radius: 12px; cursor: pointer; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem; letter-spacing: 2px; color: #000; transition: all 0.3s;
        }
        .guess-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--accent-glow); }
        .guess-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Vote Grid */
        .vote-section { margin-bottom: 20px; }
        .vote-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 12px; text-align: center; }
        .vote-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .vote-btn {
            padding: 16px 10px; background: linear-gradient(145deg, var(--surface), rgba(255,255,255,0.02));
            border: 2px solid var(--border); border-radius: 12px; color: var(--text);
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
            text-align: center; position: relative; overflow: hidden;
        }
        .vote-btn::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: transparent; transition: background 0.3s; }
        .vote-btn:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .vote-btn:hover::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        .vote-btn.selected { border-color: var(--accent); background: rgba(234,179,8,0.1); box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-3px); }
        .vote-btn.selected::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        .vote-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.12); box-shadow: 0 0 15px var(--green-glow); }
        .vote-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); }
        .vote-btn:disabled { pointer-events: none; }

        /* Buttons */
        .btn { width: 100%; padding: 16px 24px; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; border: none; }
        .btn-p { background: linear-gradient(135deg, var(--accent), #ca8a04); color: #000; font-weight: 700; box-shadow: 0 4px 20px var(--accent-glow); }
        .btn-p:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
        .btn-p:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        .btn-s { background: var(--surface); border: 2px solid var(--border); color: var(--text); }
        .btn-s:hover { border-color: var(--dim); }

        /* Results */
        .result-box {
            background: var(--card); border: 2px solid var(--border); border-radius: 16px;
            padding: 28px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden;
            animation: resultPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes resultPop { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .result-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .result-box.win { border-color: var(--green); background: linear-gradient(145deg, var(--card), rgba(34,197,94,0.08)); box-shadow: 0 0 30px var(--green-glow); }
        .result-box.win::before { background: linear-gradient(90deg, transparent, var(--green), transparent); }
        .result-box.lose { border-color: var(--red); background: linear-gradient(145deg, var(--card), rgba(239,68,68,0.08)); box-shadow: 0 0 30px var(--red-glow); }
        .result-box.lose::before { background: linear-gradient(90deg, transparent, var(--red), transparent); }
        .result-icon { font-size: 3rem; margin-bottom: 8px; }
        .result-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; margin-bottom: 8px; }
        .result-box.win .result-title { color: var(--green); text-shadow: 0 0 15px var(--green-glow); }
        .result-box.lose .result-title { color: var(--red); text-shadow: 0 0 15px var(--red-glow); }
        .result-desc { font-size: 0.9rem; color: var(--dim); line-height: 1.5; }

        /* Dramatic Overlay */
        .dramatic-overlay { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .dramatic-overlay.active { opacity: 1; pointer-events: auto; }
        .dramatic-overlay .d-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .dramatic-overlay .d-content { position: relative; z-index: 1; text-align: center; animation: dPop 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes dPop { 0% { opacity: 0; transform: scale(0.5) translateY(30px); } 60% { transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
        .dramatic-overlay .d-icon { font-size: 4.5rem; margin-bottom: 12px; }
        .dramatic-overlay .d-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 5px; margin-bottom: 8px; }
        .dramatic-overlay .d-sub { font-size: 1rem; color: var(--dim); max-width: 340px; line-height: 1.6; }
        .dramatic-overlay.gold .d-title { color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
        .dramatic-overlay.gold .d-bg { background: radial-gradient(ellipse at center, rgba(234,179,8,0.08) 0%, rgba(0,0,0,0.92) 70%); }
        .dramatic-overlay.purple .d-title { color: var(--purple); text-shadow: 0 0 30px var(--purple-glow); }
        .dramatic-overlay.red .d-title { color: var(--red); text-shadow: 0 0 30px var(--red-glow); }
        .dramatic-overlay.green .d-title { color: var(--green); text-shadow: 0 0 30px var(--green-glow); }
        @keyframes dExit { 0% { opacity: 1; } 100% { opacity: 0; transform: scale(0.85) translateY(-20px); } }

        /* Role Peek Button */
        .peek-btn { position: fixed; bottom: 80px; right: 16px; z-index: 100; background: var(--card); border: 2px solid var(--accent); border-radius: 50px; padding: 10px 18px; cursor: pointer; display: none; align-items: center; gap: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1px; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.3s; }
        .peek-btn:hover { transform: translateY(-2px); border-color: var(--accent); }
        .peek-btn.master-peek { border-color: rgba(168,85,247,0.4); }
        .peek-btn.insider-peek { border-color: rgba(239,68,68,0.4); }

        /* Peek Modal */
        .peek-overlay { position: fixed; inset: 0; z-index: 150; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); }
        .peek-overlay.active { display: flex; }
        .peek-content { max-width: 360px; width: 90%; animation: dPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .peek-close { width: 100%; margin-top: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--dim); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; cursor: pointer; }
        .peek-close:hover { color: var(--text); border-color: var(--dim); }

        /* Game Over Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .overlay.active { display: flex; }
        .modal { background: var(--card); border: 2px solid var(--accent); border-radius: 20px; padding: 36px 28px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: dPop 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 12px; }
        .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 8px; }
        .modal p { color: var(--dim); margin-bottom: 20px; font-size: 0.9rem; }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns .btn { flex: 1; padding: 14px; font-size: 1rem; }

        /* Toast */
        .toast-container { position: fixed; top: 70px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 12px 16px; min-width: 200px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: toastIn 0.3s ease-out; font-size: 0.85rem; color: var(--text); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 480px) {
            main { padding: 60px 10px 24px; }
            .role-name { font-size: 1.8rem; }
            .word-txt { font-size: 2.2rem; }
            .vote-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="scene-bg"><div class="glow"></div><div class="dots"></div></div>
<div id="site-header" data-back-url="/squad-games" data-back-text="Squad"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Dramatic Overlay -->
<div class="dramatic-overlay" id="dramaticOverlay">
    <div class="d-bg"></div>
    <div class="d-content">
        <div class="d-icon" id="dIcon"></div>
        <div class="d-title" id="dTitle"></div>
        <div class="d-sub" id="dSub"></div>
    </div>
</div>

<!-- Role Peek -->
<button class="peek-btn" id="peekBtn" onclick="openPeek()" style="display:none">
    <span id="peekBtnIcon"></span> MY ROLE
</button>
<div class="peek-overlay" id="peekOverlay" onclick="closePeek(event)">
    <div class="peek-content">
        <div class="role-card" id="peekCard">
            <div class="role-icon" id="peekIcon"></div>
            <div class="role-lbl">YOUR ROLE</div>
            <div class="role-name" id="peekRoleName"></div>
            <div class="role-desc" id="peekRoleDesc"></div>
            <div id="peekWord" style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:4px;color:var(--accent);text-shadow:0 0 15px var(--accent-glow);margin-top:12px;"></div>
        </div>
        <button class="peek-close" onclick="closePeek()">CLOSE</button>
    </div>
</div>

<main>
    <div style="text-align:center"><span class="room-badge" id="room">------</span></div>

    <div class="role-card" id="roleCard">
        <div class="role-icon" id="roleIcon">&#128373;</div>
        <div class="role-lbl">YOUR ROLE</div>
        <div class="role-name" id="roleName">???</div>
        <div class="role-desc" id="roleDesc">Waiting for the game to start...</div>
    </div>

    <div class="word-card" id="wordCard">
        <div class="word-lbl">SECRET WORD</div>
        <div class="word-txt" id="wordTxt">???</div>
    </div>

    <div class="timer-section" id="timerSection" style="display:none">
        <div class="timer-txt" id="timerTxt">5:00</div>
        <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    </div>

    <div class="phase-card" id="phaseCard">
        <div class="phase-title" id="phaseTitle">WAITING</div>
        <div class="phase-desc" id="phaseDesc">The game will begin shortly...</div>
    </div>

    <div class="guess-wrap" id="guessWrap" style="display:none">
        <input type="text" class="guess-input" id="guessInput" placeholder="Type your guess...">
        <button class="guess-btn" id="guessBtn" onclick="submitGuess()">GUESS</button>
    </div>

    <div class="vote-section" id="voteSection" style="display:none">
        <div class="vote-title">WHO IS THE INSIDER?</div>
        <div class="vote-grid" id="voteGrid"></div>
    </div>

    <div class="result-box" id="resultBox" style="display:none">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle">Result</div>
        <div class="result-desc" id="resultDesc">Description</div>
    </div>

    <button class="btn btn-p" id="actionBtn" onclick="handleAction()" disabled>START GAME</button>
</main>

<!-- Game Over -->
<div class="overlay" id="gameoverOverlay">
    <div class="modal">
        <div class="modal-icon">&#128373;</div>
        <h2 id="goTitle">GAME OVER</h2>
        <p id="goDesc">The game has ended.</p>
        <div class="modal-btns">
            <button class="btn btn-s" onclick="location.href='/squad-games.html'">LEAVE</button>
            <button class="btn btn-p" onclick="location.href='/waiting-room.html?room='+roomCode">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
const BACKEND_URL = 'https://web-production-519c7.up.railway.app';
const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
const urlParams = new URLSearchParams(location.search);
const roomCode = urlParams.get('room') || localStorage.getItem('tempRoomCode');
const playerName = localStorage.getItem('tempPlayerName') || localStorage.getItem('playerName');
document.getElementById('room').textContent = roomCode || '------';
if (!roomCode || !playerName) location.href = '/lobby.html?game=insider';

let state = { players: [], role: 'villager', word: '', masterName: '', phase: 'waiting', myVote: null, isHost: localStorage.getItem('tempIsHost') === 'true', timeRemaining: 300, timeLimit: 300 };
let timerInt = null;
let dramaticTimeout = null;

socket.on('connect', () => socket.emit('rejoin-room', { roomCode, playerName }));

socket.on('room-joined', d => {
    state.players = d.room.players || [];
    const me = state.players.find(p => p.name === playerName);
    if (me) state.isHost = me.isHost;
    document.getElementById('actionBtn').disabled = !state.isHost;
    document.getElementById('actionBtn').textContent = state.isHost ? 'START GAME' : 'WAITING FOR HOST...';
});

socket.on('player-joined', d => { state.players = d.room.players || []; });
socket.on('player-disconnected', d => { state.players = d.room.players || []; });

socket.on('insider-roles', d => {
    state.phase = 'questioning';
    state.role = d.role;
    state.word = d.word || '';
    state.masterName = d.master || '';
    state.timeLimit = d.timeLimit || 300;
    state.timeRemaining = state.timeLimit;

    const roleCard = document.getElementById('roleCard');
    const ROLES = {
        master: { icon: '&#128302;', name: 'WORD MASTER', desc: 'You know the word! Answer yes/no questions. Guide them without being obvious.', css: 'master', color: 'var(--purple)' },
        insider: { icon: '&#127917;', name: 'THE INSIDER', desc: 'You secretly know the word! Help others find it — but don\'t get caught.', css: 'insider-role', color: 'var(--red)' },
        villager: { icon: '&#128373;', name: 'VILLAGER', desc: 'Ask yes/no questions to find the secret word! Then find the Insider.', css: '', color: 'var(--accent)' }
    };
    const cfg = ROLES[d.role] || ROLES.villager;

    roleCard.className = 'role-card ' + cfg.css;
    document.getElementById('roleIcon').innerHTML = cfg.icon;
    document.getElementById('roleName').textContent = cfg.name;
    document.getElementById('roleDesc').textContent = cfg.desc;

    if (d.word) {
        document.getElementById('wordTxt').textContent = d.word;
        document.getElementById('wordTxt').classList.remove('word-hidden');
    } else {
        document.getElementById('wordTxt').textContent = '???';
        document.getElementById('wordTxt').classList.add('word-hidden');
    }

    setupPeekBtn(d.role, d.word);

    document.getElementById('phaseTitle').textContent = 'QUESTIONING PHASE';
    document.getElementById('phaseDesc').textContent = d.role === 'master' ? 'Answer yes/no questions from the group. Master: ' + d.master : 'Ask ' + d.master + ' yes/no questions to find the word!';
    document.getElementById('guessWrap').style.display = d.role === 'master' ? 'none' : 'flex';
    document.getElementById('voteSection').style.display = 'none';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('timerSection').style.display = 'block';
    document.getElementById('actionBtn').style.display = 'none';

    startTimer();

    // Dramatic role reveal
    showDramatic(d.role === 'insider' ? 'red' : d.role === 'master' ? 'purple' : 'gold', cfg.icon, cfg.name, cfg.desc, 2500);
});

socket.on('insider-word-found', d => {
    state.phase = 'voting';
    state.word = d.word;
    state.myVote = null;
    stopTimer();

    document.getElementById('wordTxt').textContent = d.word;
    document.getElementById('wordTxt').classList.remove('word-hidden');

    showDramatic('green', '&#10004;', 'WORD FOUND!', d.guesser + ' guessed the word: ' + d.word, 2000, () => {
        document.getElementById('phaseTitle').textContent = 'VOTING PHASE';
        document.getElementById('phaseDesc').textContent = 'Someone knew too much... Vote for who you think is the Insider!';
        document.getElementById('guessWrap').style.display = 'none';
        document.getElementById('voteSection').style.display = 'block';
        renderVoteGrid();
        document.getElementById('actionBtn').style.display = 'block';
        document.getElementById('actionBtn').textContent = 'LOCK IN VOTE';
        document.getElementById('actionBtn').disabled = true;
        state.timeRemaining = 60;
        state.timeLimit = 60;
        startTimer();
    });
});

socket.on('insider-timeout', d => {
    state.phase = 'results';
    stopTimer();
    document.getElementById('guessWrap').style.display = 'none';
    showDramatic('red', '&#9200;', 'TIME\'S UP!', 'The word was: ' + d.word + '. The Insider was: ' + d.insider, 2500, () => {
        showResultBox(false, 'Time ran out!', 'The word was "' + d.word + '." The Insider (' + d.insider + ') wins!');
        document.getElementById('actionBtn').style.display = 'block';
        document.getElementById('actionBtn').textContent = state.isHost ? 'PLAY AGAIN' : 'WAITING...';
        document.getElementById('actionBtn').disabled = !state.isHost;
    });
});

socket.on('insider-results', d => {
    state.phase = 'results';
    stopTimer();
    const found = d.foundInsider;
    const title = found ? 'INSIDER CAUGHT!' : 'INSIDER ESCAPES!';
    const desc = found ? 'The Insider (' + d.insider + ') was found!' : 'The Insider (' + d.insider + ') got away!';

    showDramatic(found ? 'green' : 'red', found ? '&#128737;' : '&#127917;', title, desc, 2500, () => {
        showResultBox(found, title, desc);

        // Highlight votes
        document.querySelectorAll('.vote-btn').forEach(el => {
            if (el.dataset.name === d.insider) el.classList.add('correct');
            else if (el.classList.contains('selected')) el.classList.add('wrong');
            el.disabled = true;
        });

        document.getElementById('actionBtn').style.display = 'block';
        document.getElementById('actionBtn').textContent = state.isHost ? 'PLAY AGAIN' : 'WAITING...';
        document.getElementById('actionBtn').disabled = !state.isHost;
    });
});

socket.on('insider-game-over', d => {
    stopTimer();
    const desc = d.winner === 'villagers' ? 'The villagers found the Insider!' : 'The Insider escaped!';
    document.getElementById('goTitle').textContent = d.winner === 'villagers' ? 'VILLAGERS WIN!' : 'INSIDER WINS!';
    document.getElementById('goDesc').textContent = desc + ' The word was "' + d.word + '." Insider: ' + d.insider + '. Master: ' + d.master + '.';
    document.getElementById('gameoverOverlay').classList.add('active');
});

socket.on('host-left', () => { location.href = '/squad-games.html'; });
socket.on('error', d => { showToast(d.message); });

// ─── Functions ─────────────────────────
function handleAction() {
    if (state.phase === 'waiting' && state.isHost) {
        socket.emit('insider-start', { roomCode });
    } else if (state.phase === 'voting' && state.myVote) {
        socket.emit('insider-vote', { roomCode, target: state.myVote });
        document.getElementById('actionBtn').disabled = true;
        document.getElementById('actionBtn').textContent = 'VOTED!';
        document.querySelectorAll('.vote-btn').forEach(el => el.style.pointerEvents = 'none');
    } else if (state.phase === 'results' && state.isHost) {
        socket.emit('insider-next', { roomCode });
    }
}

function submitGuess() {
    const input = document.getElementById('guessInput');
    const guess = input.value.trim();
    if (!guess) return;
    socket.emit('insider-guess', { roomCode, guess });
    input.value = '';
    showToast('Guess submitted: ' + guess);
}

document.getElementById('guessInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitGuess();
});

function renderVoteGrid() {
    const grid = document.getElementById('voteGrid');
    grid.innerHTML = state.players.map(p =>
        '<button class="vote-btn" onclick="selectVote(\'' + esc(p.name) + '\')" data-name="' + esc(p.name) + '">' + esc(p.name) + (p.name === playerName ? ' (You)' : '') + '</button>'
    ).join('');
}

function selectVote(name) {
    if (state.phase !== 'voting') return;
    state.myVote = name;
    document.querySelectorAll('.vote-btn').forEach(el => el.classList.toggle('selected', el.dataset.name === name));
    document.getElementById('actionBtn').disabled = false;
}

function showResultBox(win, title, desc) {
    const box = document.getElementById('resultBox');
    box.style.display = 'block';
    box.className = 'result-box ' + (win ? 'win' : 'lose');
    document.getElementById('resultIcon').innerHTML = win ? '&#128737;' : '&#127917;';
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultDesc').textContent = desc;
    document.getElementById('timerSection').style.display = 'none';
}

// ─── Timer ─────────────────────────────
function startTimer() { stopTimer(); updTimer(); timerInt = setInterval(() => { state.timeRemaining--; updTimer(); if (state.timeRemaining <= 0) stopTimer(); }, 1000); document.getElementById('timerSection').style.display = 'block'; }
function stopTimer() { if (timerInt) { clearInterval(timerInt); timerInt = null; } }
function updTimer() {
    const m = Math.floor(state.timeRemaining / 60);
    const s = state.timeRemaining % 60;
    const el = document.getElementById('timerTxt');
    el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    el.classList.toggle('danger', state.timeRemaining <= 30);
    document.getElementById('timerFill').style.width = (state.timeRemaining / state.timeLimit * 100) + '%';
}

// ─── Dramatic Overlay ──────────────────
function showDramatic(type, icon, title, sub, duration, cb) {
    const ov = document.getElementById('dramaticOverlay');
    const ct = ov.querySelector('.d-content');
    if (dramaticTimeout) clearTimeout(dramaticTimeout);
    ov.className = 'dramatic-overlay ' + type;
    document.getElementById('dIcon').innerHTML = icon;
    document.getElementById('dTitle').textContent = title;
    document.getElementById('dSub').textContent = sub;
    ct.style.animation = 'none'; ct.offsetHeight; ct.style.animation = '';
    ov.classList.add('active');
    dramaticTimeout = setTimeout(() => {
        ct.style.animation = 'dExit 0.4s ease-in forwards';
        setTimeout(() => { ov.classList.remove('active'); ov.className = 'dramatic-overlay'; ct.style.animation = ''; if (cb) cb(); }, 400);
    }, duration);
}

// ─── Role Peek ─────────────────────────
function setupPeekBtn(role, word) {
    const btn = document.getElementById('peekBtn');
    const ICONS = { master: '&#128302;', insider: '&#127917;', villager: '&#128373;' };
    document.getElementById('peekBtnIcon').innerHTML = ICONS[role] || ICONS.villager;
    btn.className = 'peek-btn' + (role === 'master' ? ' master-peek' : role === 'insider' ? ' insider-peek' : '');
    btn.style.display = 'flex';
}

function openPeek() {
    const ROLES = {
        master: { icon: '&#128302;', name: 'WORD MASTER', desc: 'Answer yes/no questions.', css: 'master' },
        insider: { icon: '&#127917;', name: 'THE INSIDER', desc: 'Help find the word without being caught.', css: 'insider-role' },
        villager: { icon: '&#128373;', name: 'VILLAGER', desc: 'Ask questions to find the word.', css: '' }
    };
    const cfg = ROLES[state.role] || ROLES.villager;
    document.getElementById('peekCard').className = 'role-card ' + cfg.css;
    document.getElementById('peekIcon').innerHTML = cfg.icon;
    document.getElementById('peekRoleName').textContent = cfg.name;
    document.getElementById('peekRoleDesc').textContent = cfg.desc;
    document.getElementById('peekWord').textContent = state.word || '';
    document.getElementById('peekOverlay').classList.add('active');
}

function closePeek(e) { if (e && e.target !== document.getElementById('peekOverlay')) return; document.getElementById('peekOverlay').classList.remove('active'); }

// ─── Toast ─────────────────────────────
function showToast(msg) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(30px)'; t.style.transition = 'all 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
window.addEventListener('beforeunload', () => { stopTimer(); socket.disconnect(); });
</script>
