<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Never Have I Ever: Party - TheGaming.co</title>

    <meta name="description" content="Never Have I Ever: Party - The classic party game with up to 100 players! See who's done what.">
    <meta name="keywords" content="never have i ever, party game, drinking game, multiplayer, free, online game, large group">
    <meta name="author" content="TheGaming.co">
    <meta name="theme-color" content="#ec4899">
    <link rel="stylesheet" href="/header.css">

    <meta property="og:title" content="Never Have I Ever: Party - TheGaming.co">
    <meta property="og:description" content="The classic party game with up to 100 players!">
    <meta property="og:type" content="website">

    <link rel="canonical" href="https://thegaming.co/never-ever-party.html">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #ec4899;
            --accent-glow: rgba(236, 72, 153, 0.4);
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --has: #22c55e;
            --has-glow: rgba(34, 197, 94, 0.3);
            --hasnt: #6366f1;
            --hasnt-glow: rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                var(--bg-primary);
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }

        .header-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: white;
            text-decoration: none;
        }

        .header-logo::after {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, var(--has), var(--accent), var(--hasnt));
            margin-top: 2px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 70px 16px 20px;
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 8px;
        }
        .round-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent);
        }
        .vote-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .vote-count span { color: var(--accent); font-weight: 700; }

        /* Timer Bar */
        .timer-bar-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--has), var(--accent), var(--hasnt));
            width: 100%;
            transition: width 0.3s linear;
        }

        /* Statement Card */
        .statement-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 28px;
        }

        .nhie-card {
            position: relative;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.08), rgba(168, 85, 247, 0.06));
            border: 2px solid rgba(236, 72, 153, 0.25);
            border-radius: 24px;
            padding: 48px 28px;
            text-align: center;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.08);
        }

        .nhie-badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent), #a855f7);
            padding: 6px 18px;
            border-radius: 20px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        .nhie-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        /* Response Buttons */
        .response-buttons {
            display: flex;
            gap: 14px;
        }

        .response-btn {
            flex: 1;
            padding: 28px 16px;
            border: 2px solid var(--border);
            border-radius: 18px;
            background: var(--bg-secondary);
            color: var(--text);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .response-btn .emoji { font-size: 3rem; }

        .response-btn.has-btn:hover, .response-btn.has-btn.selected {
            border-color: var(--has);
            background: rgba(34, 197, 94, 0.12);
            box-shadow: 0 0 40px var(--has-glow);
            transform: translateY(-3px);
        }

        .response-btn.hasnt-btn:hover, .response-btn.hasnt-btn.selected {
            border-color: var(--hasnt);
            background: rgba(99, 102, 241, 0.12);
            box-shadow: 0 0 40px var(--hasnt-glow);
            transform: translateY(-3px);
        }

        .response-btn:disabled { cursor: not-allowed; opacity: 0.7; transform: none !important; }

        /* Waiting */
        .waiting-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 16px;
        }
        .waiting-text { font-size: 1.1rem; color: var(--text-muted); }
        .waiting-count { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--accent); }
        .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-stmt {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .result-pct-card {
            text-align: center;
            padding: 28px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), rgba(99, 102, 241, 0.08));
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .result-pct-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .result-pct-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: 1;
            color: var(--has);
            text-shadow: 0 0 40px var(--has-glow);
        }
        .result-pct-sub {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Split Columns */
        .split-columns {
            display: flex;
            gap: 10px;
        }
        .col {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            overflow: hidden;
        }
        .col.has-col { border-color: rgba(34, 197, 94, 0.35); }
        .col.hasnt-col { border-color: rgba(99, 102, 241, 0.35); }

        .col-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .has-col .col-header { color: var(--has); }
        .hasnt-col .col-header { color: var(--hasnt); }

        .name-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
        }
        .name-item {
            padding: 7px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }

        .next-btn {
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

        /* Game Over */
        .game-over-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 24px;
        }
        .game-over-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 4px; color: var(--accent); }
        .game-over-subtitle { font-size: 1.1rem; color: var(--text-muted); }
        .play-again-btn { padding: 16px 40px; background: linear-gradient(135deg, var(--accent), #a855f7); border: none; border-radius: 14px; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; }
        .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

        /* Countdown */
        .countdown-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 10, 15, 0.95); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .countdown-number { font-family: 'Bebas Neue', sans-serif; font-size: 15rem; color: var(--accent); text-shadow: 0 0 100px var(--accent-glow); animation: countPulse 1s ease-in-out; }
        @keyframes countPulse { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            header { height: 56px; }
            main { padding: 66px 12px 16px; }
            .nhie-text { font-size: 1.6rem; }
            .nhie-card { padding: 40px 20px; }
            .response-btn { padding: 22px 12px; font-size: 1.2rem; }
            .response-btn .emoji { font-size: 2.5rem; }
            .result-pct-value { font-size: 4rem; }
            .countdown-number { font-size: 10rem; }
        }
    </style>
</head>
<body>

<div class="bg-container"><div class="bg-gradient"></div></div>

<div id="site-header"></div>

<main>
    <div class="top-bar">
        <div class="round-badge">ROUND <span id="current-round">1</span>/<span id="total-rounds">15</span></div>
        <div class="vote-count"><span id="votes-in">0</span>/<span id="total-players">0</span> answered</div>
    </div>

    <div class="timer-bar-track" id="timer-track">
        <div class="timer-bar-fill" id="timer-fill"></div>
    </div>

    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <!-- Response Phase -->
    <div class="statement-container" id="response-phase">
        <div class="nhie-card">
            <div class="nhie-badge">NEVER HAVE I EVER</div>
            <div class="nhie-text" id="statement-text">Loading...</div>
        </div>

        <div class="response-buttons">
            <button class="response-btn has-btn" onclick="respond(true)">
                <span class="emoji">🙋</span>
                <span>I HAVE</span>
            </button>
            <button class="response-btn hasnt-btn" onclick="respond(false)">
                <span class="emoji">🙅</span>
                <span>NEVER</span>
            </button>
        </div>
    </div>

    <!-- Waiting -->
    <div class="waiting-container hidden" id="waiting-phase">
        <div class="spinner"></div>
        <div class="waiting-text">Waiting for everyone...</div>
        <div class="waiting-count"><span id="waiting-count">0</span>/<span id="waiting-total">0</span></div>
    </div>

    <!-- Results -->
    <div class="results-container hidden" id="results-phase">
        <div class="result-stmt" id="result-statement">Statement</div>

        <div class="result-pct-card">
            <div class="result-pct-label">Have Done This</div>
            <div class="result-pct-value" id="result-percent">50%</div>
            <div class="result-pct-sub"><span id="has-count">0</span> out of <span id="total-count">0</span> players</div>
        </div>

        <div class="split-columns">
            <div class="col has-col">
                <div class="col-header">🙋 I HAVE (<span id="has-num">0</span>)</div>
                <div class="name-list" id="has-list"></div>
            </div>
            <div class="col hasnt-col">
                <div class="col-header">🙅 NEVER (<span id="hasnt-num">0</span>)</div>
                <div class="name-list" id="hasnt-list"></div>
            </div>
        </div>

        <button class="next-btn" id="next-btn" onclick="nextRound()">NEXT STATEMENT</button>
    </div>

    <!-- Game Over -->
    <div class="game-over-container hidden" id="gameover-phase">
        <div class="game-over-title">GAME OVER!</div>
        <div class="game-over-subtitle">Now you know everyone's secrets!</div>
        <button class="play-again-btn" onclick="window.location.href='/waiting-room.html?room=' + roomCode">PLAY AGAIN</button>
    </div>
</main>

<script>
    const BACKEND_URL = 'https://web-production-519c7.up.railway.app';
    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });

    const SUPABASE_URL = 'https://tvvivtmzofsyehatzlvl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2dml2dG16b2ZzeWVoYXR6bHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4OTExODYsImV4cCI6MjA4MDQ2NzE4Nn0.Qy8kHMO0Nb4yJ0ZHjby7RuQtzwWB8rUcZvkdnbL1b3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room') || localStorage.getItem('tempRoomCode');
    const playerName = localStorage.getItem('tempPlayerName');
    const isHost = localStorage.getItem('tempIsHost') === 'true';

    let hasResponded = false;
    let totalPlayers = 0;
    let roundTimer = null;
    let timeLeft = 0;
    let timeTotal = 0;

    if (!roomCode) window.location.href = '/party-games.html';

    socket.on('connect', () => {
        socket.emit('rejoin-room', { roomCode, playerName });
    });

    let hasRejoined = false;

    socket.on('room-joined', (data) => {
        totalPlayers = data.room.players.length;
        document.getElementById('total-players').textContent = totalPlayers;
        document.getElementById('waiting-total').textContent = totalPlayers;
        if (!hasRejoined) startCountdown();
    });

    socket.on('neverever-rejoin-state', (data) => {
        hasRejoined = true;
        const overlay = document.getElementById('countdown-overlay');
        if (overlay) overlay.classList.add('hidden');

        document.getElementById('current-round').textContent = data.roundNumber || 1;
        document.getElementById('total-rounds').textContent = data.totalRounds || 12;

        if (data.phase === 'responding' && !data.hasResponded) {
            hasResponded = false;
            let statement = data.statement;
            statement = statement.replace(/^never have i ever\s*/i, '');
            document.getElementById('statement-text').textContent = statement.charAt(0).toUpperCase() + statement.slice(1);
            document.querySelectorAll('.response-btn').forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('selected');
            });
            showPhase('response');
        } else if (data.phase === 'responding' && data.hasResponded) {
            hasResponded = true;
            showPhase('waiting');
        } else if (data.phase === 'results') {
            showPhase('waiting');
        }
    });

    socket.on('neverever-party-statement', (data) => {
        hasResponded = false;
        document.getElementById('current-round').textContent = data.roundNumber;
        document.getElementById('total-rounds').textContent = data.totalRounds;

        let statement = data.statement;
        statement = statement.replace(/^never have i ever\s*/i, '');
        document.getElementById('statement-text').textContent = statement.charAt(0).toUpperCase() + statement.slice(1);

        document.getElementById('votes-in').textContent = '0';
        document.querySelectorAll('.response-btn').forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('selected');
        });
        showPhase('response');
        startTimer(data.timeLimit || 30);
    });

    socket.on('neverever-party-response-counted', (data) => {
        document.getElementById('votes-in').textContent = data.respondedCount;
        document.getElementById('waiting-count').textContent = data.respondedCount;
        document.getElementById('waiting-total').textContent = data.totalPlayers;
    });

    socket.on('neverever-party-results', (data) => {
        stopTimer();
        let statement = data.statement;
        statement = statement.replace(/^never have i ever\s*/i, '');
        document.getElementById('result-statement').textContent = statement.charAt(0).toUpperCase() + statement.slice(1);

        document.getElementById('result-percent').textContent = data.percentHas + '%';
        document.getElementById('has-count').textContent = data.totalHas;
        document.getElementById('total-count').textContent = data.totalHas + data.totalHasnt;
        document.getElementById('has-num').textContent = data.totalHas;
        document.getElementById('hasnt-num').textContent = data.totalHasnt;

        document.getElementById('has-list').innerHTML = data.whoHas.slice(0, 15).map(name =>
            `<div class="name-item">${escapeHtml(name)}</div>`
        ).join('') || '<div class="name-item" style="color: var(--text-muted)">No one</div>';

        document.getElementById('hasnt-list').innerHTML = data.whoHasnt.slice(0, 15).map(name =>
            `<div class="name-item">${escapeHtml(name)}</div>`
        ).join('') || '<div class="name-item" style="color: var(--text-muted)">No one</div>';

        document.getElementById('next-btn').style.display = isHost ? 'block' : 'none';
        document.getElementById('next-btn').textContent = data.isLastStatement ? 'FINISH GAME' : 'NEXT STATEMENT';

        showPhase('results');
    });

    socket.on('neverever-party-game-over', () => showPhase('gameover'));

    socket.on('neverever-party-round-transition', (data) => {
        if (isHost) socket.emit('neverever-party-start-round', { roomCode });
    });

    function startCountdown() {
        let count = 3;
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        number.textContent = count;
        overlay.classList.remove('hidden');

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                number.textContent = count;
                number.style.animation = 'none';
                void number.offsetWidth;
                number.style.animation = 'countPulse 1s ease-in-out';
            } else {
                clearInterval(interval);
                overlay.classList.add('hidden');
                if (isHost) socket.emit('neverever-party-start-round', { roomCode });
            }
        }, 1000);
    }

    function startTimer(seconds) {
        stopTimer();
        timeTotal = seconds;
        timeLeft = seconds;
        const fill = document.getElementById('timer-fill');
        fill.style.width = '100%';

        roundTimer = setInterval(() => {
            timeLeft -= 0.1;
            const pct = Math.max(0, (timeLeft / timeTotal) * 100);
            fill.style.width = pct + '%';
            if (timeLeft <= 0) {
                stopTimer();
                if (!hasResponded) {
                    hasResponded = true;
                    document.querySelectorAll('.response-btn').forEach(btn => btn.disabled = true);
                    socket.emit('neverever-party-time-up', { roomCode });
                    showPhase('waiting');
                }
            }
        }, 100);
    }

    function stopTimer() {
        if (roundTimer) { clearInterval(roundTimer); roundTimer = null; }
    }

    function respond(hasDoneIt) {
        if (hasResponded) return;
        hasResponded = true;

        document.querySelectorAll('.response-btn').forEach(btn => btn.disabled = true);
        document.querySelector(hasDoneIt ? '.has-btn' : '.hasnt-btn').classList.add('selected');

        socket.emit('neverever-party-respond', { roomCode, response: hasDoneIt });
        showPhase('waiting');
    }

    function nextRound() {
        if (isHost) socket.emit('neverever-party-next-round', { roomCode });
    }

    function showPhase(phase) {
        document.getElementById('response-phase').classList.add('hidden');
        document.getElementById('waiting-phase').classList.add('hidden');
        document.getElementById('results-phase').classList.add('hidden');
        document.getElementById('gameover-phase').classList.add('hidden');
        document.getElementById(phase + '-phase').classList.remove('hidden');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
    <script src="/header.js"></script>
<script src="/js/engagement.js"></script>
</body>
</html>
