<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hot Takes: Party - TheGaming.co</title>

    <meta name="description" content="Hot Takes: Party - Rate controversial statements with up to 100 players! Free multiplayer party game.">
    <meta name="keywords" content="hot takes, opinion game, party game, multiplayer, free, online game, large group">
    <meta name="author" content="TheGaming.co">
    <meta name="theme-color" content="#ef4444">
    <link rel="stylesheet" href="/header.css">

    <meta property="og:title" content="Hot Takes: Party - TheGaming.co">
    <meta property="og:description" content="Rate controversial statements with up to 100 players!">
    <meta property="og:type" content="website">

    <link rel="canonical" href="https://thegaming.co/hot-takes-party.html">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --cold: #3b82f6;
            --hot: #ef4444;
            --mid: #a855f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(239, 68, 68, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(249, 115, 22, 0.08) 0%, transparent 50%),
                var(--bg-primary);
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }

        .header-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: white;
            text-decoration: none;
        }

        .header-logo::after {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, var(--cold), var(--mid), var(--hot));
            margin-top: 2px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 70px 16px 20px;
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 8px;
        }

        .round-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--hot);
        }

        .vote-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .vote-count span { color: var(--hot); font-weight: 700; }

        /* Timer Bar */
        .timer-bar-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--cold), var(--mid), var(--hot));
            width: 100%;
            transition: width 0.3s linear;
        }

        /* Statement Card */
        .statement-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
        }

        .take-card {
            position: relative;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.08), rgba(249, 115, 22, 0.06));
            border: 2px solid rgba(239, 68, 68, 0.25);
            border-radius: 24px;
            padding: 44px 28px;
            text-align: center;
        }

        .take-badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--hot), #f97316);
            padding: 6px 20px;
            border-radius: 20px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        .take-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        /* Rating Controls */
        .rating-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .rating-value-display {
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: 1;
            background: linear-gradient(90deg, var(--cold), var(--mid), var(--hot));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .rating-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .rating-labels .cold { color: var(--cold); }
        .rating-labels .hot { color: var(--hot); }

        .slider-wrap {
            position: relative;
            padding: 8px 0;
        }

        .rating-slider {
            width: 100%;
            height: 14px;
            border-radius: 7px;
            background: linear-gradient(90deg, var(--cold), var(--mid), var(--hot));
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        .rating-slider::-webkit-slider-thumb {
            appearance: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--hot);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s ease;
        }
        .rating-slider::-webkit-slider-thumb:hover { transform: scale(1.12); }
        .rating-slider::-moz-range-thumb {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--hot);
            cursor: pointer;
        }

        .tick-marks {
            display: flex;
            justify-content: space-between;
            padding: 0 6px;
            margin-top: 4px;
        }
        .tick-marks span {
            font-size: 0.7rem;
            color: var(--text-muted);
            width: 18px;
            text-align: center;
        }

        .lock-btn {
            padding: 18px;
            background: linear-gradient(135deg, var(--hot), #f97316);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .lock-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
        .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Waiting */
        .waiting-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 16px;
        }
        .waiting-text { font-size: 1.1rem; color: var(--text-muted); }
        .waiting-count { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--hot); }
        .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--hot); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-take {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .avg-display {
            text-align: center;
            padding: 28px;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(168,85,247,0.08), rgba(239,68,68,0.1));
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .avg-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .avg-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: 1;
            background: linear-gradient(90deg, var(--cold), var(--mid), var(--hot));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dist-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
        }
        .dist-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            text-align: center;
        }
        .dist-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 90px;
            gap: 5px;
        }
        .dist-bar {
            flex: 1;
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.6s cubic-bezier(.4,0,.2,1);
        }
        .dist-bar:nth-child(1) { background: var(--cold); }
        .dist-bar:nth-child(2) { background: #5b8def; }
        .dist-bar:nth-child(3) { background: #7c6ef5; }
        .dist-bar:nth-child(4) { background: #9b5de5; }
        .dist-bar:nth-child(5) { background: var(--mid); }
        .dist-bar:nth-child(6) { background: #c253d1; }
        .dist-bar:nth-child(7) { background: #d64a82; }
        .dist-bar:nth-child(8) { background: #e04555; }
        .dist-bar:nth-child(9) { background: #ea5a2e; }
        .dist-bar:nth-child(10) { background: var(--hot); }
        .dist-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }
        .dist-labels span {
            flex: 1;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .extremes-row {
            display: flex;
            gap: 10px;
        }
        .extreme-card {
            flex: 1;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
        }
        .extreme-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .extreme-name { font-weight: 700; font-size: 1rem; }
        .extreme-card.agree { border-color: rgba(239,68,68,0.4); }
        .extreme-card.agree .extreme-name { color: var(--hot); }
        .extreme-card.disagree { border-color: rgba(59,130,246,0.4); }
        .extreme-card.disagree .extreme-name { color: var(--cold); }

        .next-btn {
            padding: 16px;
            background: linear-gradient(135deg, var(--hot), #f97316);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

        /* Game Over */
        .game-over-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 24px;
        }
        .game-over-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 4px; color: var(--hot); }
        .game-over-subtitle { font-size: 1.1rem; color: var(--text-muted); }
        .play-again-btn { padding: 16px 40px; background: linear-gradient(135deg, var(--hot), #f97316); border: none; border-radius: 14px; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; }
        .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

        /* Countdown */
        .countdown-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 10, 15, 0.95); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .countdown-number { font-family: 'Bebas Neue', sans-serif; font-size: 15rem; color: var(--hot); text-shadow: 0 0 100px var(--accent-glow); animation: countPulse 1s ease-in-out; }
        @keyframes countPulse { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            header { height: 56px; }
            main { padding: 66px 12px 16px; }
            .take-text { font-size: 1.5rem; }
            .take-card { padding: 36px 20px; }
            .rating-value-display { font-size: 4rem; }
            .avg-number { font-size: 4rem; }
            .countdown-number { font-size: 10rem; }
        }
    </style>
</head>
<body>

<div class="bg-container"><div class="bg-gradient"></div></div>

<div id="site-header"></div>

<main>
    <div class="top-bar">
        <div class="round-badge">TAKE <span id="current-round">1</span>/<span id="total-rounds">12</span></div>
        <div class="vote-count"><span id="votes-in">0</span>/<span id="total-players">0</span> rated</div>
    </div>

    <div class="timer-bar-track" id="timer-track">
        <div class="timer-bar-fill" id="timer-fill"></div>
    </div>

    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <!-- Rating Phase -->
    <div class="statement-container" id="rating-phase">
        <div class="take-card">
            <div class="take-badge">HOT TAKE</div>
            <div class="take-text" id="statement-text">Loading...</div>
        </div>

        <div class="rating-section">
            <div class="rating-value-display" id="rating-display">5</div>
            <div class="rating-labels">
                <span class="cold">DISAGREE</span>
                <span class="hot">AGREE</span>
            </div>
            <div class="slider-wrap">
                <input type="range" class="rating-slider" id="rating-slider" min="1" max="10" value="5" oninput="updateRatingDisplay()">
            </div>
            <div class="tick-marks">
                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
            </div>
            <button class="lock-btn" id="submit-btn" onclick="submitRating()">LOCK IN</button>
        </div>
    </div>

    <!-- Waiting -->
    <div class="waiting-container hidden" id="waiting-phase">
        <div class="spinner"></div>
        <div class="waiting-text">Waiting for everyone to rate...</div>
        <div class="waiting-count"><span id="waiting-count">0</span>/<span id="waiting-total">0</span></div>
    </div>

    <!-- Results -->
    <div class="results-container hidden" id="results-phase">
        <div class="result-take" id="result-statement">Statement</div>

        <div class="avg-display">
            <div class="avg-label">Group Average</div>
            <div class="avg-number" id="result-average">5.0</div>
        </div>

        <div class="dist-card">
            <div class="dist-title">Rating Distribution</div>
            <div class="dist-bars" id="distribution-bars"></div>
            <div class="dist-labels">
                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
            </div>
        </div>

        <div class="extremes-row" id="extremes-section">
            <div class="extreme-card agree">
                <div class="extreme-label">Most Agrees</div>
                <div class="extreme-name" id="most-agree">-</div>
            </div>
            <div class="extreme-card disagree">
                <div class="extreme-label">Most Disagrees</div>
                <div class="extreme-name" id="most-disagree">-</div>
            </div>
        </div>

        <button class="next-btn" id="next-btn" onclick="nextRound()">NEXT TAKE</button>
    </div>

    <!-- Game Over -->
    <div class="game-over-container hidden" id="gameover-phase">
        <div class="game-over-title">THAT'S A WRAP!</div>
        <div class="game-over-subtitle">Thanks for sharing your hot takes!</div>
        <button class="play-again-btn" onclick="window.location.href='/waiting-room.html?room=' + roomCode">PLAY AGAIN</button>
    </div>
</main>

<script>
    const BACKEND_URL = 'https://web-production-519c7.up.railway.app';
    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });

    const SUPABASE_URL = 'https://tvvivtmzofsyehatzlvl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2dml2dG16b2ZzeWVoYXR6bHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4OTExODYsImV4cCI6MjA4MDQ2NzE4Nn0.Qy8kHMO0Nb4yJ0ZHjby7RuQtzwWB8rUcZvkdnbL1b3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room') || localStorage.getItem('tempRoomCode');
    const playerName = localStorage.getItem('tempPlayerName');
    const isHost = localStorage.getItem('tempIsHost') === 'true';

    let hasRated = false;
    let totalPlayers = 0;
    let roundTimer = null;
    let timeLeft = 0;
    let timeTotal = 0;

    if (!roomCode) window.location.href = '/party-games.html';

    socket.on('connect', () => {
        socket.emit('rejoin-room', { roomCode, playerName });
    });

    let hasRejoined = false;

    socket.on('room-joined', (data) => {
        totalPlayers = data.room.players.length;
        document.getElementById('total-players').textContent = totalPlayers;
        document.getElementById('waiting-total').textContent = totalPlayers;
        if (!hasRejoined) startCountdown();
    });

    socket.on('hottakes-rejoin-state', (data) => {
        hasRejoined = true;
        const overlay = document.getElementById('countdown-overlay');
        if (overlay) overlay.classList.add('hidden');

        document.getElementById('current-round').textContent = data.roundNumber || 1;
        document.getElementById('total-rounds').textContent = data.totalRounds || 10;

        if (data.phase === 'rating' && !data.hasRated) {
            hasRated = false;
            document.getElementById('statement-text').textContent = data.statement;
            document.getElementById('rating-slider').value = 5;
            document.getElementById('rating-display').textContent = '5';
            document.getElementById('submit-btn').disabled = false;
            showPhase('rating');
        } else if (data.phase === 'rating' && data.hasRated) {
            hasRated = true;
            showPhase('waiting');
        } else if (data.phase === 'results') {
            showPhase('waiting');
        }
    });

    socket.on('hottakes-party-statement', (data) => {
        hasRated = false;
        document.getElementById('current-round').textContent = data.roundNumber;
        document.getElementById('total-rounds').textContent = data.totalRounds;
        document.getElementById('statement-text').textContent = data.statement;
        document.getElementById('rating-slider').value = 5;
        document.getElementById('rating-display').textContent = '5';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('votes-in').textContent = '0';
        showPhase('rating');
        startTimer(data.timeLimit || 30);
    });

    socket.on('hottakes-party-rate-counted', (data) => {
        document.getElementById('votes-in').textContent = data.ratedCount;
        document.getElementById('waiting-count').textContent = data.ratedCount;
        document.getElementById('waiting-total').textContent = data.totalPlayers;
    });

    socket.on('hottakes-party-results', (data) => {
        stopTimer();
        document.getElementById('result-statement').textContent = data.statement;
        document.getElementById('result-average').textContent = data.average.toFixed(1);

        // Distribution bars
        const barsContainer = document.getElementById('distribution-bars');
        const maxCount = Math.max(...data.distribution, 1);
        barsContainer.innerHTML = data.distribution.map((count, i) =>
            `<div class="dist-bar" style="height: ${Math.max((count / maxCount) * 100, 4)}%"></div>`
        ).join('');

        // Extremes
        document.getElementById('most-agree').textContent = data.mostAgree || '-';
        document.getElementById('most-disagree').textContent = data.mostDisagree || '-';

        document.getElementById('next-btn').style.display = isHost ? 'block' : 'none';
        document.getElementById('next-btn').textContent = data.isLastStatement ? 'SEE FINAL RESULTS' : 'NEXT TAKE';

        showPhase('results');
    });

    socket.on('hottakes-party-game-over', () => showPhase('gameover'));

    socket.on('hottakes-party-round-transition', (data) => {
        if (isHost) socket.emit('hottakes-party-start-round', { roomCode });
    });

    function startCountdown() {
        let count = 3;
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        number.textContent = count;
        overlay.classList.remove('hidden');

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                number.textContent = count;
                number.style.animation = 'none';
                void number.offsetWidth;
                number.style.animation = 'countPulse 1s ease-in-out';
            } else {
                clearInterval(interval);
                overlay.classList.add('hidden');
                if (isHost) socket.emit('hottakes-party-start-round', { roomCode });
            }
        }, 1000);
    }

    function startTimer(seconds) {
        stopTimer();
        timeTotal = seconds;
        timeLeft = seconds;
        const fill = document.getElementById('timer-fill');
        fill.style.width = '100%';

        roundTimer = setInterval(() => {
            timeLeft -= 0.1;
            const pct = Math.max(0, (timeLeft / timeTotal) * 100);
            fill.style.width = pct + '%';
            if (timeLeft <= 0) {
                stopTimer();
                if (!hasRated) {
                    hasRated = true;
                    document.getElementById('submit-btn').disabled = true;
                    socket.emit('hottakes-party-time-up', { roomCode });
                    showPhase('waiting');
                }
            }
        }, 100);
    }

    function stopTimer() {
        if (roundTimer) { clearInterval(roundTimer); roundTimer = null; }
    }

    function updateRatingDisplay() {
        document.getElementById('rating-display').textContent = document.getElementById('rating-slider').value;
    }

    function submitRating() {
        if (hasRated) return;
        hasRated = true;
        const rating = parseInt(document.getElementById('rating-slider').value);
        document.getElementById('submit-btn').disabled = true;
        socket.emit('hottakes-party-rate', { roomCode, rating });
        showPhase('waiting');
    }

    function nextRound() {
        if (isHost) socket.emit('hottakes-party-next-round', { roomCode });
    }

    function showPhase(phase) {
        document.getElementById('rating-phase').classList.add('hidden');
        document.getElementById('waiting-phase').classList.add('hidden');
        document.getElementById('results-phase').classList.add('hidden');
        document.getElementById('gameover-phase').classList.add('hidden');
        document.getElementById(phase + '-phase').classList.remove('hidden');
    }
</script>
    <script src="/header.js"></script>
<script src="/js/engagement.js"></script>
</body>
</html>
