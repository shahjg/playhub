<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>This or That - TheGaming.co</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/header.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --blue: #3b82f6;
            --blue-glow: rgba(59,130,246,0.35);
            --pink: #f43f5e;
            --pink-glow: rgba(244,63,94,0.35);
            --accent: #a855f7;
            --accent-glow: rgba(168,85,247,0.3);
            --text: #fff;
            --muted: rgba(255,255,255,0.5);
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --green: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        .bg-container {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 60% 40% at 0% 30%, rgba(59,130,246,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 100% 70%, rgba(244,63,94,0.08) 0%, transparent 70%),
                var(--bg);
        }
        main {
            flex: 1; display: flex; flex-direction: column;
            padding: 70px 16px 20px;
            position: relative; z-index: 1;
            max-width: 700px; margin: 0 auto; width: 100%;
        }

        /* Top bar */
        .game-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 18px;
            background: rgba(15,15,25,0.85);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
        }
        .round-info {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem; letter-spacing: 3px; color: var(--accent);
        }
        .round-info .num { color: var(--text); }
        .vote-count { font-size: 0.8rem; color: var(--muted); }
        .vote-count span { color: var(--accent); font-weight: 700; }
        .timer-bar {
            height: 3px; background: var(--border); border-radius: 2px;
            margin-top: 6px; overflow: hidden;
        }
        .timer-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--blue), var(--accent), var(--pink));
            transition: width 1s linear;
        }

        /* Countdown */
        .countdown-overlay {
            position: fixed; inset: 0;
            background: rgba(10,10,15,0.96);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        .countdown-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14rem; color: var(--accent);
            text-shadow: 0 0 120px var(--accent-glow);
            animation: countPulse 1s ease-in-out;
        }
        @keyframes countPulse {
            0% { transform: scale(0.4); opacity: 0; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Question Phase - Split Screen Style */
        .question-phase {
            flex: 1; display: flex; flex-direction: column; gap: 0;
            position: relative;
        }
        .choice-btn {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 32px 24px;
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 800; font-size: 1.6rem;
            letter-spacing: 0.5px;
            color: white;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
            text-align: center; line-height: 1.3;
        }
        .choice-a {
            background: linear-gradient(135deg, rgba(59,130,246,0.2) 0%, rgba(59,130,246,0.08) 100%);
            border: 2px solid rgba(59,130,246,0.25);
            border-radius: 20px 20px 6px 6px;
        }
        .choice-a:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(59,130,246,0.35) 0%, rgba(59,130,246,0.15) 100%);
            border-color: var(--blue);
            box-shadow: 0 0 50px var(--blue-glow), inset 0 0 30px rgba(59,130,246,0.1);
            transform: scale(1.02);
        }
        .choice-b {
            background: linear-gradient(135deg, rgba(244,63,94,0.08) 0%, rgba(244,63,94,0.2) 100%);
            border: 2px solid rgba(244,63,94,0.25);
            border-radius: 6px 6px 20px 20px;
        }
        .choice-b:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(244,63,94,0.15) 0%, rgba(244,63,94,0.35) 100%);
            border-color: var(--pink);
            box-shadow: 0 0 50px var(--pink-glow), inset 0 0 30px rgba(244,63,94,0.1);
            transform: scale(1.02);
        }
        .choice-btn.selected {
            transform: scale(1.03);
        }
        .choice-a.selected {
            border-color: var(--blue);
            background: linear-gradient(135deg, rgba(59,130,246,0.4) 0%, rgba(59,130,246,0.2) 100%);
            box-shadow: 0 0 60px var(--blue-glow);
        }
        .choice-b.selected {
            border-color: var(--pink);
            background: linear-gradient(135deg, rgba(244,63,94,0.2) 0%, rgba(244,63,94,0.4) 100%);
            box-shadow: 0 0 60px var(--pink-glow);
        }
        .choice-btn:disabled { cursor: default; }
        .choice-btn .label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.75rem; letter-spacing: 3px;
            position: absolute; top: 12px; left: 18px;
            opacity: 0.5;
        }
        .choice-a .label { color: var(--blue); }
        .choice-b .label { color: var(--pink); }
        .choice-btn .check {
            position: absolute; top: 12px; right: 18px;
            font-size: 1.2rem; opacity: 0;
            transition: opacity 0.3s;
        }
        .choice-btn.selected .check { opacity: 1; }

        .vs-divider {
            display: flex; align-items: center; justify-content: center;
            padding: 8px 0; position: relative; z-index: 2;
        }
        .vs-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem; letter-spacing: 4px;
            color: var(--muted);
            background: rgba(15,15,25,0.9);
            border: 1px solid var(--border);
            padding: 4px 20px; border-radius: 20px;
        }

        /* Waiting */
        .waiting-phase {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; gap: 16px;
        }
        .waiting-phase .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .waiting-phase .label { font-size: 1rem; color: var(--muted); }
        .waiting-phase .count {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem; color: var(--accent);
        }

        /* Results Phase */
        .results-phase {
            flex: 1; display: flex; flex-direction: column; gap: 16px;
        }
        .result-header {
            text-align: center; padding: 16px 0;
        }
        .result-label {
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 3px; color: var(--muted); margin-bottom: 6px;
        }
        .result-winner {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem; letter-spacing: 3px;
        }
        .result-winner.blue { color: var(--blue); text-shadow: 0 0 40px var(--blue-glow); }
        .result-winner.pink { color: var(--pink); text-shadow: 0 0 40px var(--pink-glow); }
        .result-winner.tie { color: var(--accent); text-shadow: 0 0 40px var(--accent-glow); }

        .result-bars {
            display: flex; flex-direction: column; gap: 12px;
        }
        .result-option {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 18px;
            border-radius: 14px;
            position: relative; overflow: hidden;
        }
        .result-option.opt-a {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.2);
        }
        .result-option.opt-b {
            background: rgba(244,63,94,0.08);
            border: 1px solid rgba(244,63,94,0.2);
        }
        .result-option .fill {
            position: absolute; inset: 0;
            border-radius: 14px;
            transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .result-option.opt-a .fill { background: rgba(59,130,246,0.15); }
        .result-option.opt-b .fill { background: rgba(244,63,94,0.15); }
        .result-option .text {
            flex: 1; font-weight: 700; font-size: 1.05rem;
            position: relative; z-index: 1;
        }
        .result-option .pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem; position: relative; z-index: 1;
        }
        .result-option.opt-a .pct { color: var(--blue); }
        .result-option.opt-b .pct { color: var(--pink); }
        .result-option .votes {
            font-size: 0.75rem; color: var(--muted);
            position: relative; z-index: 1;
        }

        .result-voters {
            display: flex; gap: 10px;
        }
        .voter-col {
            flex: 1; padding: 14px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px;
        }
        .voter-col-title {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 8px;
        }
        .voter-col.blue .voter-col-title { color: var(--blue); }
        .voter-col.pink .voter-col-title { color: var(--pink); }
        .voter-names {
            display: flex; flex-wrap: wrap; gap: 4px;
        }
        .voter-name {
            font-size: 0.75rem; padding: 3px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px; color: var(--muted);
        }

        .next-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent), rgba(168,85,247,0.7));
            border: none; border-radius: 14px;
            color: white; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.25rem; letter-spacing: 3px;
            cursor: pointer; transition: all 0.3s;
            margin-top: auto; box-shadow: 0 6px 30px var(--accent-glow);
        }
        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px var(--accent-glow);
        }

        /* Game Over */
        .gameover-phase {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; gap: 20px;
        }
        .gameover-phase .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem; letter-spacing: 6px;
            background: linear-gradient(135deg, var(--blue), var(--accent), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .gameover-phase .sub {
            font-size: 1rem; color: var(--muted);
        }
        .play-again-btn {
            padding: 14px 40px;
            background: var(--accent); border: none; border-radius: 14px;
            color: white; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem; letter-spacing: 3px;
            cursor: pointer; transition: all 0.3s;
        }
        .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            main { padding: 66px 10px 14px; }
            .choice-btn { font-size: 1.25rem; padding: 24px 16px; }
            .countdown-number { font-size: 10rem; }
            .result-winner { font-size: 2rem; }
        }
        @media (min-width: 900px) {
            .question-phase { flex-direction: row; gap: 0; }
            .choice-a { border-radius: 20px 6px 6px 20px; }
            .choice-b { border-radius: 6px 20px 20px 6px; }
            .choice-btn { min-height: 300px; font-size: 2rem; }
            .vs-divider { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        }
    </style>
</head>
<body>

<div class="bg-container"></div>
<div id="site-header"></div>

<main>
    <div class="game-bar">
        <div class="round-info">ROUND <span class="num" id="current-round">1</span>/<span class="num" id="total-rounds">10</span></div>
        <div class="vote-count"><span id="votes-in">0</span>/<span id="total-players">0</span> voted</div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>

    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <!-- Question Phase -->
    <div class="question-phase" id="question-phase">
        <button class="choice-btn choice-a" id="choice-a" onclick="vote('A')">
            <span class="label">A</span>
            <span class="text" id="option-a-text">Option A</span>
            <span class="check">&#10003;</span>
        </button>
        <div class="vs-divider"><div class="vs-badge">VS</div></div>
        <button class="choice-btn choice-b" id="choice-b" onclick="vote('B')">
            <span class="label">B</span>
            <span class="text" id="option-b-text">Option B</span>
            <span class="check">&#10003;</span>
        </button>
    </div>

    <!-- Waiting Phase -->
    <div class="waiting-phase hidden" id="waiting-phase">
        <div class="spinner"></div>
        <div class="label">Waiting for votes...</div>
        <div class="count"><span id="waiting-count">0</span>/<span id="waiting-total">0</span></div>
    </div>

    <!-- Results Phase -->
    <div class="results-phase hidden" id="results-phase">
        <div class="result-header">
            <div class="result-label">The group chose</div>
            <div class="result-winner" id="result-winner">TIE!</div>
        </div>
        <div class="result-bars">
            <div class="result-option opt-a">
                <div class="fill" id="fill-a" style="width:0%"></div>
                <div class="text" id="res-a-text">A</div>
                <div class="votes" id="res-a-votes">0</div>
                <div class="pct" id="res-a-pct">50%</div>
            </div>
            <div class="result-option opt-b">
                <div class="fill" id="fill-b" style="width:0%"></div>
                <div class="text" id="res-b-text">B</div>
                <div class="votes" id="res-b-votes">0</div>
                <div class="pct" id="res-b-pct">50%</div>
            </div>
        </div>
        <div class="result-voters" id="result-voters"></div>
        <button class="next-btn" id="next-btn" style="display:none" onclick="nextRound()">NEXT QUESTION</button>
    </div>

    <!-- Game Over -->
    <div class="gameover-phase hidden" id="gameover-phase">
        <div class="title">GAME OVER</div>
        <div class="sub">Thanks for playing This or That!</div>
        <button class="play-again-btn" id="play-again-btn">PLAY AGAIN</button>
    </div>
</main>

<script>
    const BACKEND_URL = 'https://web-production-519c7.up.railway.app';
    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'], reconnection: true, reconnectionAttempts: 10 });

    const SUPABASE_URL = 'https://tvvivtmzofsyehatzlvl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2dml2dG16b2ZzeWVoYXR6bHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4OTExODYsImV4cCI6MjA4MDQ2NzE4Nn0.Qy8kHMO0Nb4yJ0ZHjby7RuQtzwWB8rUcZvkdnbL1b3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room') || localStorage.getItem('tempRoomCode');
    const playerName = localStorage.getItem('tempPlayerName');
    const isHost = localStorage.getItem('tempIsHost') === 'true';

    let hasVoted = false;
    let totalPlayers = 0;
    let timerInterval = null;
    let timeLeft = 15;
    let maxTime = 15;

    if (!roomCode) window.location.href = '/party-games.html';

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== SOCKET EVENTS =====

    socket.on('connect', () => {
        socket.emit('rejoin-room', { roomCode, playerName });
    });

    let hasRejoined = false;

    socket.on('room-joined', (data) => {
        totalPlayers = data.room.players.length;
        document.getElementById('total-players').textContent = totalPlayers;
        document.getElementById('waiting-total').textContent = totalPlayers;
        if (!hasRejoined) startCountdown();
    });

    // Mid-game reconnection
    socket.on('thisorthat-rejoin-state', (data) => {
        hasRejoined = true;
        document.getElementById('countdown-overlay').classList.add('hidden');
        document.getElementById('current-round').textContent = data.roundNumber || 1;
        document.getElementById('total-rounds').textContent = data.totalRounds || 10;

        if (data.phase === 'voting' && !data.hasVoted) {
            hasVoted = false;
            document.getElementById('option-a-text').textContent = data.optionA;
            document.getElementById('option-b-text').textContent = data.optionB;
            resetChoiceButtons();
            showPhase('question');
        } else if (data.phase === 'voting' && data.hasVoted) {
            showPhase('waiting');
        } else if (data.phase === 'results') {
            showPhase('waiting');
        }
    });

    // New question
    socket.on('thisorthat-party-question', (data) => {
        hasVoted = false;
        document.getElementById('current-round').textContent = data.roundNumber || 1;
        document.getElementById('total-rounds').textContent = data.totalRounds || 10;
        document.getElementById('option-a-text').textContent = data.optionA;
        document.getElementById('option-b-text').textContent = data.optionB;
        document.getElementById('votes-in').textContent = '0';
        resetChoiceButtons();
        showPhase('question');

        // Start timer
        maxTime = data.timeLimit || 15;
        timeLeft = maxTime;
        document.getElementById('timer-fill').style.width = '100%';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-fill').style.width = Math.max(0, (timeLeft / maxTime) * 100) + '%';
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (!hasVoted) {
                    hasVoted = true;
                    document.getElementById('choice-a').disabled = true;
                    document.getElementById('choice-b').disabled = true;
                    showPhase('waiting');
                }
                if (isHost) socket.emit('thisorthat-party-time-up', { roomCode });
            }
        }, 1000);
    });

    // Vote counting
    socket.on('thisorthat-party-vote-counted', (data) => {
        document.getElementById('votes-in').textContent = data.votedCount || 0;
        document.getElementById('waiting-count').textContent = data.votedCount || 0;
        if (data.totalPlayers) {
            totalPlayers = data.totalPlayers;
            document.getElementById('total-players').textContent = totalPlayers;
            document.getElementById('waiting-total').textContent = totalPlayers;
        }
    });

    // Results
    socket.on('thisorthat-party-results', (data) => {
        clearInterval(timerInterval);

        document.getElementById('res-a-text').textContent = data.optionA;
        document.getElementById('res-b-text').textContent = data.optionB;
        document.getElementById('res-a-pct').textContent = data.percentA + '%';
        document.getElementById('res-b-pct').textContent = data.percentB + '%';
        document.getElementById('res-a-votes').textContent = data.votesA + (data.votesA === 1 ? ' vote' : ' votes');
        document.getElementById('res-b-votes').textContent = data.votesB + (data.votesB === 1 ? ' vote' : ' votes');

        // Animate fill bars
        setTimeout(() => {
            document.getElementById('fill-a').style.width = data.percentA + '%';
            document.getElementById('fill-b').style.width = data.percentB + '%';
        }, 50);

        // Winner
        const winner = document.getElementById('result-winner');
        if (data.percentA > data.percentB) {
            winner.textContent = data.optionA;
            winner.className = 'result-winner blue';
        } else if (data.percentB > data.percentA) {
            winner.textContent = data.optionB;
            winner.className = 'result-winner pink';
        } else {
            winner.textContent = "IT'S A TIE!";
            winner.className = 'result-winner tie';
        }

        // Voter names
        const votersDiv = document.getElementById('result-voters');
        let votersHtml = '';
        if (data.votersA && data.votersA.length) {
            votersHtml += '<div class="voter-col blue"><div class="voter-col-title">' + escapeHtml(data.optionA) + '</div><div class="voter-names">';
            data.votersA.forEach(n => { votersHtml += '<div class="voter-name">' + escapeHtml(n) + '</div>'; });
            votersHtml += '</div></div>';
        }
        if (data.votersB && data.votersB.length) {
            votersHtml += '<div class="voter-col pink"><div class="voter-col-title">' + escapeHtml(data.optionB) + '</div><div class="voter-names">';
            data.votersB.forEach(n => { votersHtml += '<div class="voter-name">' + escapeHtml(n) + '</div>'; });
            votersHtml += '</div></div>';
        }
        votersDiv.innerHTML = votersHtml;

        // Next button
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = isHost ? 'block' : 'none';
        nextBtn.textContent = data.isLastQuestion ? 'SEE FINAL RESULTS' : 'NEXT QUESTION';

        // Reset fill bars before showing
        document.getElementById('fill-a').style.width = '0%';
        document.getElementById('fill-b').style.width = '0%';
        showPhase('results');

        // Animate after show
        setTimeout(() => {
            document.getElementById('fill-a').style.width = data.percentA + '%';
            document.getElementById('fill-b').style.width = data.percentB + '%';
        }, 100);
    });

    // Round transition
    socket.on('thisorthat-party-round-transition', (data) => {
        if (isHost) {
            socket.emit('thisorthat-party-start-round', { roomCode });
        }
    });

    // Game over
    socket.on('thisorthat-party-game-over', (data) => {
        clearInterval(timerInterval);
        showPhase('gameover');
    });

    // Play Again: host resets room, non-host goes to waiting room
    document.getElementById('play-again-btn').addEventListener('click', () => {
        if (isHost) socket.emit('host-return-lobby', { roomCode });
        else window.location.href = '/waiting-room.html?room=' + roomCode;
    });

    socket.on('force-return-lobby', () => {
        window.location.href = '/waiting-room.html?room=' + roomCode;
    });

    // ===== FUNCTIONS =====

    function startCountdown() {
        let count = 3;
        const overlay = document.getElementById('countdown-overlay');
        const num = document.getElementById('countdown-number');
        num.textContent = count;
        overlay.classList.remove('hidden');

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                num.textContent = count;
                num.style.animation = 'none';
                void num.offsetWidth;
                num.style.animation = 'countPulse 1s ease-in-out';
            } else {
                clearInterval(interval);
                overlay.classList.add('hidden');
                if (isHost) socket.emit('thisorthat-party-start-round', { roomCode });
            }
        }, 1000);
    }

    function vote(option) {
        if (hasVoted) return;
        hasVoted = true;

        const a = document.getElementById('choice-a');
        const b = document.getElementById('choice-b');
        a.disabled = true;
        b.disabled = true;

        if (option === 'A') a.classList.add('selected');
        else b.classList.add('selected');

        socket.emit('thisorthat-party-vote', { roomCode, choice: option });
        showPhase('waiting');
    }

    function nextRound() {
        if (!isHost) return;
        socket.emit('thisorthat-party-next-round', { roomCode });
    }

    function resetChoiceButtons() {
        const a = document.getElementById('choice-a');
        const b = document.getElementById('choice-b');
        a.disabled = false;
        b.disabled = false;
        a.classList.remove('selected');
        b.classList.remove('selected');
    }

    function showPhase(phase) {
        document.getElementById('question-phase').classList.add('hidden');
        document.getElementById('waiting-phase').classList.add('hidden');
        document.getElementById('results-phase').classList.add('hidden');
        document.getElementById('gameover-phase').classList.add('hidden');
        document.getElementById(phase + '-phase').classList.remove('hidden');
    }
</script>

<script src="/header.js"></script>
<script src="/js/engagement.js"></script>
</body>
